<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#fff;color:#222}

/* Toggle bar */

.topbar button{background:none;border:none;color:#888;cursor:pointer;font:12px 'Inter',sans-serif;padding:4px 8px}

/* Header */
header{background:#222;color:#fff;padding:14px 20px;position:sticky;top:60px;z-index:998;border-bottom:1px solid #333;transition:all .3s}
body.dark header{background:#111}
header.collapsed{max-height:0;padding:0 20px;overflow:hidden;border:none}
header h1{font-size:14px;font-weight:600;margin-bottom:10px}
.filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filters select,.filters button{font:12px 'Inter',sans-serif;padding:4px 10px;border:1px solid #555;background:transparent;color:#ccc;border-radius:3px;cursor:pointer}
.filters select option{background:#222;color:#ccc}
.filters button:hover{border-color:#999;color:#fff}
.filters .active{background:#fff;color:#222;border-color:#fff}
body.dark .filters .active{background:#ccc;color:#111}
.stats{font-size:11px;color:#999;margin-top:8px;display:flex;gap:16px}
.statsbar{background:#1a1a1a;border-bottom:1px solid #252525;padding:6px 20px;display:flex;gap:16px;align-items:center;font-size:12px;color:#aaa;position:sticky;top:28px;z-index:999}
body:not(.dark) .statsbar{background:#f5f5f5;border-bottom-color:#e0e0e0;color:#666}
.statsbar .stat-item{display:flex;align-items:center;gap:4px}
.statsbar .stat-val{font-weight:600;color:#ddd}

.statsbar .stat-right{color:#5b5}
.statsbar .stat-wrong{color:#b55}
.statsbar .stat-pct{font-weight:700;font-size:14px;margin-left:auto;color:#fff}
body:not(.dark) .statsbar .stat-pct{color:#222}

/* Main */
.wrap{max-width:780px;margin:20px auto;padding:0 16px}
.prog{height:3px;background:#e0e0e0;margin-bottom:16px}
body.dark .prog{background:#333}
.prog-fill{height:3px;background:#444;width:0%;transition:width .3s}

/* Grid */
.grid{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:16px}

body.dark .grid button.cur{border-color:#aaa;background:#2a2a2a}
.grid button.done{background:#e8e8e8}
body.dark .grid button.done{background:#252525}
.grid button.right{border-left:2px solid #4a4}
.grid button.wrong{border-left:2px solid #a44}

/* Card */
.qcard{border:1px solid #e0e0e0;padding:24px;margin-bottom:16px}
body.dark .qcard{border-color:#2a2a2a}
.qinfo{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.qnum{font-weight:600;font-size:13px}
.tags{display:flex;gap:4px}
.diff{font-size:10px;padding:2px 7px;border:1px solid #999;border-radius:3px}
.cat{font-size:10px;padding:2px 7px;border:1px solid #6a8;color:#6a8;border-radius:3px}
body.dark .cat{border-color:#5a7;color:#5a7}
.qtxt{font-size:14.5px;line-height:1.75;margin-bottom:18px}
.lab{background:#f8f8f0;border:1px solid #e0dcc8;border-radius:4px;padding:10px 14px;margin:10px 0 16px;font-size:12.5px;line-height:1.8}
body.dark .lab{background:#1a1a14;border-color:#333020}

/* Options */
.opt{display:block;width:100%;text-align:left;padding:11px 14px;margin-bottom:6px;border:1px solid #ddd;background:#fff;font-size:13.5px;line-height:1.5;cursor:pointer;border-radius:4px;font-family:inherit;transition:all .15s}
body.dark .opt{background:#1a1a1a;border-color:#2a2a2a;color:#d4d4d4}
.opt:hover{background:#f5f5f5}
body.dark .opt:hover{background:#222}
.opt.sel{border-color:#444;background:#f0f0f0}
body.dark .opt.sel{border-color:#666;background:#252525}
.opt.correct{border-color:#4a4;background:#efffef}
body.dark .opt.correct{border-color:#4a4;background:#1a2e1a}
.opt.wrong{border-color:#a44;background:#fff0f0}
body.dark .opt.wrong{border-color:#a44;background:#2e1a1a}

/* Buttons */
.btns{display:flex;gap:8px;margin-top:14px}
.btns button{padding:7px 14px;border:1px solid #444;background:#222;color:#fff;border-radius:4px;cursor:pointer;font:13px 'Inter',sans-serif}
body.dark .btns button{background:#2a2a2a;border-color:#444}
.btns button:hover{background:#333}

/* Explanation */
.expl{margin-top:14px;padding:14px;background:#fafafa;border-left:3px solid #222;display:none;font-size:13px;line-height:1.7}
body.dark .expl{background:#1a1a1a;border-left-color:#666}
.expl.show{display:block}
.expl strong{display:block;margin-bottom:6px}

/* Nav */
.nav{display:flex;justify-content:space-between;margin-top:14px}
.nav button{padding:7px 18px;border:1px solid #ddd;background:#fff;cursor:pointer;border-radius:4px;font:13px 'Inter',sans-serif}
body.dark .nav button{background:#1e1e1e;border-color:#333;color:#ccc}

/* Score */
.score{text-align:center;padding:40px;display:none}
.score h2{margin-bottom:12px;font-size:20px}
.score .perc{font-size:48px;font-weight:700;margin:16px 0}
.score .detail{font-size:14px;color:#666;line-height:1.8}
body.dark .score .detail{color:#999}

/* Responsive */
@media(max-width:600px){
  .wrap{padding:0 10px}
  .qcard{padding:16px}
  .filters{gap:4px}

}

<script>
const ALL=[
// ===== I. SISTEMA COMPLEMENTO (6 questões) =====
{n:1,q:"Paciente de 25 anos com meningite bacteriana recorrente por <i>Neisseria meningitidis</i>. Investigação laboratorial revela deficiência de C5-C9 (complemento terminal). O infectologista explica que o sistema complemento possui três vias de ativação.<br><br>Qual via é ativada diretamente por anticorpos IgG ou IgM ligados ao patógeno, e qual é o primeiro componente envolvido?",opts:["Via alternativa — Fator B se liga a PAMPs bacterianos","Via clássica — C1q se liga ao domínio Fc de IgG/IgM no complexo antígeno-anticorpo, iniciando a cascata C1→C4→C2→C3","Via das lectinas — MBL reconhece manose na superfície bacteriana","Via alternativa — C3 sofre hidrólise espontânea (tick-over) na superfície do patógeno","Via clássica — C3b opsoniza diretamente sem necessidade de anticorpo"],cor:1,let:"B",exp:"Via CLÁSSICA: anticorpo (IgG/IgM) liga-se ao antígeno → C1q reconhece domínio Fc do anticorpo → ativa C1r/C1s → cliva C4 e C2 → forma C3 convertase (C4b2a). Via ALTERNATIVA: não precisa de anticorpo, C3 sofre hidrólise espontânea (tick-over). Via das LECTINAS: MBL reconhece manose. A deficiência de C5-C9 (MAC) explica a susceptibilidade a Neisseria, pois este gênero é particularmente dependente de lise por MAC para sua eliminação.",dif:"Médio",cat:"Complemento"},
{n:2,q:"Recém-nascido com infecções bacterianas graves desde as primeiras semanas de vida. A dosagem de C3 sérico é indetectável. O restante do complemento está normal.<br><br><div class='lab'>• C3: indetectável<br>• C4: normal<br>• CH50: muito reduzido<br>• Imunoglobulinas: normais</div>Por que a deficiência de C3 é tão devastadora comparada à deficiência de outros componentes?",opts:["C3 é exclusivo da via clássica e sem ele não há ativação por anticorpos","C3 é o ponto de convergência das três vias do complemento — sem C3, nenhuma via completa a cascata: não há opsonização (C3b), não há anafilaxia (C3a), e não se forma o MAC (C5b-9)","C3 é produzido exclusivamente pelo timo e sua ausência indica aplasia tímica","C3 é necessário apenas para lise viral, e bactérias são eliminadas por outras vias","A deficiência de C3 não é grave se as imunoglobulinas estiverem normais"],cor:1,let:"B",exp:"C3 é a ENCRUZILHADA do sistema complemento — todas as três vias (clássica, alternativa, lectinas) convergem na clivagem de C3. Sem C3: (1) sem C3b = sem opsonização (fagocitose prejudicada), (2) sem C3a = sem recrutamento inflamatório, (3) sem C5 convertase = sem MAC = sem lise. Por isso CH50 está muito reduzido (mede via clássica completa). C4 normal indica que o início da via clássica funciona, mas para em C3.",dif:"Difícil",cat:"Complemento"},
{n:3,q:"Paciente de 22 anos desenvolve edema facial súbito e dor abdominal recorrente. O diagnóstico é angioedema hereditário por deficiência de inibidor de C1 (C1-INH). Sem esse regulador, a cascata do complemento se ativa de forma descontrolada.<br><br>Qual é a consequência bioquímica direta da ausência de C1-INH neste paciente?",opts:["Formação descontrolada de MAC nos vasos sanguíneos causando hemólise","Ativação descontrolada de C1r/C1s → clivagem excessiva de C4/C2 → produção de bradicinina e C2-cinina → vasodilatação e aumento de permeabilidade vascular → edema","Produção excessiva de C5a causando anafilaxia sistêmica permanente","Opsonização descontrolada de hemácias próprias por C3b","Ativação constitutiva de NK por fragmentos do complemento"],cor:1,let:"B",exp:"C1-INH é o regulador principal da via clássica — inibe C1r e C1s. Sem C1-INH: C1 permanece ativo → cliva C4/C2 sem controle → fragmentos de C2 (C2-cinina) + bradicinina (via calicreína, também regulada por C1-INH) → vasodilatação + permeabilidade vascular = EDEMA. O angioedema hereditário NÃO é mediado por histamina (anti-histamínicos não funcionam). Tratamento: reposição de C1-INH ou inibidores de bradicinina (icatibanto).",dif:"Difícil",cat:"Complemento"},
{n:4,q:"Paciente com hemoglobinúria paroxística noturna (HPN) apresenta hemólise intravascular crônica. A investigação revela ausência de CD55 (DAF) e CD59 (MIRL) nas hemácias.<br><br>Qual é a função dessas moléculas e por que sua ausência causa hemólise?",opts:["CD55 e CD59 são receptores de IgG que impedem a opsonização de hemácias","CD55 acelera a degradação de C3/C5 convertases e CD59 bloqueia a inserção do MAC (C5b-9) na membrana; sem eles, o complemento ativado espontaneamente (via alternativa) destrói as próprias hemácias por lise","CD55 e CD59 são moléculas de adesão que mantêm hemácias aderidas ao endotélio","CD55 produz anticorpos protetores e CD59 ativa linfócitos T reguladores","CD55 e CD59 impedem a fagocitose esplênica por bloqueio de receptores Fc"],cor:1,let:"B",exp:"HPN = deficiência de âncora GPI → hemácias não expressam CD55 (DAF = Decay Accelerating Factor, degrada C3/C5 convertases) nem CD59 (MIRL = inibe inserção de C9 no MAC). Normalmente, a via alternativa tem ativação basal (tick-over de C3), mas CD55/CD59 protegem células próprias. Sem eles: complemento destrói hemácias próprias → hemólise intravascular → hemoglobinúria (escura de manhã porque complemento se ativa mais durante o sono com pH levemente ácido).",dif:"Difícil",cat:"Complemento"},
{n:5,q:"Estudante questiona o professor sobre as anafilotoxinas do complemento. O professor responde que C5a é considerada a mais potente.<br><br>Dentre as funções das anafilotoxinas C3a, C4a e C5a, qual NÃO é uma ação desses fragmentos?",opts:["Contração de musculatura lisa brônquica","Aumento da permeabilidade vascular","Quimiotaxia de neutrófilos (especialmente C5a)","Desgranulação de mastócitos com liberação de histamina","Opsonização direta de patógenos para fagocitose"],cor:4,let:"E",exp:"Anafilotoxinas (C3a, C4a, C5a) causam: (1) contração de músculo liso, (2) aumento de permeabilidade vascular, (3) desgranulação de mastócitos/basófilos → histamina, (4) quimiotaxia (C5a é o mais potente quimiotático). OPSONIZAÇÃO é função de C3b e C4b (fragmentos grandes que se depositam na superfície do patógeno), NÃO das anafilotoxinas (fragmentos pequenos e solúveis). C5a > C3a > C4a em potência.",dif:"Médio",cat:"Complemento"},
{n:6,q:"Paciente com lúpus eritematoso sistêmico (LES) apresenta deficiência genética de C2. O reumatologista explica que deficiências de componentes iniciais da via clássica (C1q, C2, C4) estão fortemente associadas ao LES.<br><br>Qual é a explicação imunológica para essa associação?",opts:["Sem via clássica, não há produção de anticorpos contra DNA, reduzindo a inflamação","A via clássica é essencial para a depuração (clearance) de imunocomplexos e células apoptóticas; sem ela, imunocomplexos se acumulam nos tecidos e restos celulares não são removidos, expondo autoantígenos e gerando autoimunidade","C2 é necessário para a seleção negativa no timo e sua falta permite escape de T autorreativos","A deficiência de C2 causa neutropenia, que leva à infecção crônica e autoimunidade secundária","C2 inibe diretamente a produção de autoanticorpos pelos linfócitos B"],cor:1,let:"B",exp:"Via clássica = depuração de imunocomplexos (IC) e células apoptóticas. C1q se liga diretamente a células apoptóticas e a IC → ativa complemento → C3b opsoniza → fagócitos removem. Sem C1q/C2/C4: (1) IC se acumulam em rim, pele, articulações → inflamação crônica, (2) células apoptóticas não removidas → exposição de autoantígenos nucleares (DNA, histonas) → ativação de B autorreativos → anti-dsDNA, anti-Smith → LES. Por isso deficiência de C1q tem ~93% de risco de LES.",dif:"Difícil",cat:"Complemento"},

// ===== II. HLA/MHC E APRESENTAÇÃO DE ANTÍGENOS (7 questões) =====
{n:7,q:"Paciente de 10 anos diagnosticada com Diabetes Mellitus tipo 1. Tipagem HLA: DR3/DR4. Anticorpos anti-GAD65 e anti-IA2 positivos. Peptídeo C indetectável.<br><br><div class='lab'>• Glicemia de jejum: 320 mg/dL<br>• HbA1c: 11,2%<br>• Anti-GAD65: positivo<br>• Anti-IA2: positivo<br>• Peptídeo C: indetectável</div>Qual é a relação entre HLA-DR3/DR4 e a destruição das células beta?",opts:["HLA-DR3/DR4 são anticorpos que atacam diretamente as ilhotas pancreáticas","HLA-DR3/DR4 (MHC classe II) apresenta autoantígenos de células beta (GAD65, proinsulina) a linfócitos T CD4+ autorreativos que escaparam da seleção negativa tímica → CD4+ ativam CTLs CD8+ → destruição das ilhotas por perforina/granzima","HLA-DR3/DR4 impede a maturação de linfócitos no timo, causando imunodeficiência","HLA-DR3/DR4 bloqueia a produção de insulina por mecanismo não-imunológico","Os anticorpos anti-GAD são a causa primária da destruição, sem participação de células T"],cor:1,let:"B",exp:"DM1 = autoimunidade mediada por células T, NÃO por anticorpos. HLA-DR3/DR4 = MHC classe II → apresenta peptídeos a CD4+. O bolso de ligação do DR3/DR4 acomoda eficientemente peptídeos de GAD65 e proinsulina → apresentação a T CD4+ autorreativos → help para CD8+ citotóxicos → destruição de células beta. Anti-GAD e anti-IA2 são MARCADORES diagnósticos, não a causa. Peptídeo C indetectável = sem produção de insulina = destruição completa.",dif:"Difícil",cat:"HLA/MHC"},
{n:8,q:"Homem de 30 anos com espondilite anquilosante (EA) em uso de anti-TNF-α apresenta melhora da lombalgia inflamatória. Tipagem: HLA-B27 positivo.<br><br>Qual a classe do HLA-B27, a que tipo de linfócito ele apresenta antígenos, e por que o anti-TNF-α é eficaz?",opts:["HLA-B27 é classe II, apresenta a CD4+; anti-TNF-α bloqueia a ajuda de TFH","HLA-B27 é classe I (loci A, B, C), apresenta peptídeos a CD8+; o TNF-α produzido por macrófagos ativados amplifica a inflamação articular, e bloqueá-lo reduz dano tecidual","HLA-B27 é um receptor de complemento; anti-TNF-α inibe a cascata do complemento","HLA-B27 é uma imunoglobulina; anti-TNF-α previne a ligação do anticorpo às articulações","HLA-B27 é classe I mas apresenta a CD4+; anti-TNF-α atua como anti-histamínico"],cor:1,let:"B",exp:"Memorize: HLA-A, B, C = CLASSE I → expressas em TODAS as células nucleadas → apresentam a CD8+. HLA-DR, DQ, DP = CLASSE II → expressas apenas em APCs → apresentam a CD4+. B27 é CLASSE I. Na EA: B27 pode apresentar peptídeos artrogênicos a CD8+ autorreativos → inflamação → macrófagos produzem TNF-α → amplificação inflamatória → destruição articular. Anti-TNF-α (infliximabe, adalimumabe) bloqueia a citocina efetora.",dif:"Médio",cat:"HLA/MHC"},
{n:9,q:"Mulher de 35 anos com doença celíaca confirmada (atrofia vilositária, infiltrado linfocitário intraepitelial). HLA-DQ2 positivo. Após dieta sem glúten, anti-transglutaminase tecidual (anti-tTG IgA) negativa e sintomas desaparecem.<br><br>Qual o papel do HLA-DQ2 na patogênese da doença celíaca?",opts:["HLA-DQ2 é um anticorpo que degrada o glúten no intestino","HLA-DQ2 (MHC classe II) apresenta peptídeos de gliadina deamidados pela transglutaminase tecidual a linfócitos T CD4+ na lâmina própria → resposta TH1 com IFN-γ → ativação de CD8+ intraepiteliais → destruição de enterócitos → atrofia vilositária","HLA-DQ2 é MHC classe I e apresenta gliadina a CD8+ diretamente","HLA-DQ2 ativa o complemento contra os enterócitos","HLA-DQ2 bloqueia a absorção intestinal de glúten por mecanismo físico"],cor:1,let:"B",exp:"Doença celíaca = modelo de predisposição genética (HLA-DQ2/DQ8 = classe II) + gatilho ambiental (glúten). Mecanismo: transglutaminase tecidual deamida gliadina → peptídeos deamidados encaixam no bolso do DQ2 → apresentação a CD4+ → TH1 com IFN-γ → ativação de CD8+ intraepiteliais → lise de enterócitos. Dieta sem glúten remove o antígeno → sem apresentação → sem inflamação → mucosa regenera.",dif:"Difícil",cat:"HLA/MHC"},
{n:10,q:"Em uma aula sobre transplantes, o professor explica que a tipagem HLA é fundamental para o sucesso do transplante renal. Ele pergunta: 'Quantos loci de HLA classe I existem e qual o padrão de herança?'<br><br>Assinale a alternativa correta sobre a genética do HLA classe I:",opts:["HLA classe I possui 1 locus (apenas HLA-A) com herança recessiva","HLA classe I possui 3 loci (A, B, C), é codificado no cromossomo 6 e tem expressão CODOMINANTE — ambos os alelos herdados (materno e paterno) são expressos simultaneamente na superfície celular","HLA classe I possui 5 loci e é expresso apenas em células do sistema imune","HLA classe I possui 2 loci (A e B) com herança dominante simples","HLA classe I é codificado no cromossomo X e tem herança ligada ao sexo"],cor:1,let:"B",exp:"HLA classe I: 3 loci = HLA-A, HLA-B, HLA-C. Cromossomo 6. Expressão CODOMINANTE = ambos os alelos (paterno e materno) expressos. Isso significa que cada pessoa expressa até 6 moléculas HLA classe I diferentes (2 de cada locus). Importância clínica: quanto mais alelos incompatíveis entre doador e receptor, maior o risco de rejeição. MHC é o sistema genético mais polimórfico do genoma humano.",dif:"Médio",cat:"HLA/MHC"},
{n:11,q:"Paciente de 45 anos recebe transplante renal. Seis meses depois, apresenta elevação de creatinina. A biópsia mostra infiltrado de CD8+ no interstício do enxerto com necrose tubular. C4d negativo, anticorpos anti-HLA negativos.<br><br><div class='lab'>• Creatinina: 3,8 mg/dL (basal: 1,2)<br>• Biópsia: CD8+ intersticial, necrose tubular<br>• C4d: negativo<br>• Anti-HLA doador: negativos</div>Qual o tipo de rejeição e o mecanismo?",opts:["Rejeição hiperaguda por anticorpos pré-formados anti-ABO","Rejeição aguda CELULAR: CD8+ do receptor reconhecem HLA classe I do doador como non-self (alorreconhecimento direto) → destroem células tubulares por perforina/granzima","Rejeição crônica humoral com C4d positivo e anticorpos anti-HLA","GVHD — linfócitos do doador atacam o receptor","Nefrotoxicidade por imunossupressores sem componente imune"],cor:1,let:"B",exp:"C4d negativo + anti-HLA negativos = descarta rejeição humoral. Infiltrado de CD8+ = REJEIÇÃO AGUDA CELULAR. O CD8+ do receptor reconhece HLA-I do doador (presente em TODAS as células nucleadas do enxerto) como estranho → alorreconhecimento direto → ativação → perforina/granzima → necrose tubular. GVHD ocorre em transplante de medula (linfócitos do doador atacam receptor), não em transplante de órgão sólido.",dif:"Difícil",cat:"HLA/MHC"},
{n:12,q:"Um vírus infecta uma célula epitelial. A proteína viral é sintetizada no citoplasma da célula infectada.<br><br>Qual a via de processamento e apresentação deste antígeno endógeno?",opts:["Proteína viral é fagocitada → degradada em endossomo → peptídeo se liga a MHC II → apresentação a CD4+","Proteína viral citoplásmica → degradada pelo PROTEASSOMA → peptídeo transportado ao retículo endoplasmático pelo TAP → liga-se a MHC classe I → apresentação na superfície a CD8+","Proteína viral é secretada → reconhecida diretamente por anticorpos IgM sem processamento","Proteína viral ativa TLR4 na superfície → NF-κB → apresentação direta sem MHC","Proteína viral é apresentada por MHC classe II a CD8+"],cor:1,let:"B",exp:"Antígenos ENDÓGENOS (sintetizados dentro da célula: vírus, proteínas tumorais) → via citosólica: (1) proteassoma degrada proteína em peptídeos, (2) TAP (Transporter Associated with Processing) transporta peptídeos ao RE, (3) peptídeo se liga a MHC-I no RE, (4) complexo MHC-I+peptídeo vai à superfície, (5) CD8+ reconhece via TCR. Antígenos EXÓGENOS (fagocitados) → via endossomal → MHC-II → CD4+.",dif:"Médio",cat:"HLA/MHC"},
{n:13,q:"Paciente alérgico a penicilina. O professor explica que a penicilina sozinha é muito pequena para ser imunogênica — ela precisa se ligar a uma proteína carreadora do corpo para gerar resposta imune.<br><br>Qual o conceito imunológico que descreve este fenômeno?",opts:["Superantígeno — a penicilina ativa 20% dos linfócitos T simultaneamente","Hapteno — a penicilina é uma molécula pequena (hapteno) que sozinha não é imunogênica, mas ao se conjugar com proteínas séricas (carreador) forma um complexo hapteno-carreador capaz de gerar resposta imune adaptativa","Mimetismo molecular — a penicilina imita proteínas humanas","Adjuvante — a penicilina potencializa a resposta a outros antígenos","Tolerância oral — a penicilina é reconhecida como self e não deveria causar resposta"],cor:1,let:"B",exp:"HAPTENO = molécula pequena, NÃO imunogênica sozinha, mas que se torna imunogênica ao se ligar a uma proteína carreadora. Exemplo clássico: penicilina se liga a albumina sérica → complexo hapteno-carreador → B internaliza o complexo → apresenta peptídeos da proteína carreadora via MHC-II a TFH → help → B produz anticorpos contra a penicilina. Outro exemplo: DNP (dinitrofenol) — usado em laboratório. O hapteno precisa de T-help via a proteína carreadora.",dif:"Médio",cat:"HLA/MHC"},

// ===== III. ÓRGÃOS LINFOIDES (5 questões) =====
{n:14,q:"Criança com síndrome de DiGeorge (aplasia tímica) apresenta infecções virais e fúngicas graves desde o nascimento, mas as infecções bacterianas extracelulares são relativamente controladas por anticorpos maternos.<br><br>Por que a ausência do timo é devastadora para a resposta contra vírus e fungos intracelulares?",opts:["O timo produz anticorpos IgG contra vírus","Sem timo, não há maturação de linfócitos T → sem T CD4+ (comando) e sem T CD8+ (citotoxicidade) → resposta adaptativa celular inexistente; vírus e fungos intracelulares dependem de TH1/CD8+ para controle, que é impossível sem maturação tímica","O timo produz complemento, que é essencial contra vírus","Sem timo, os linfócitos B não funcionam e não há produção de IgE antiviral","O timo é o órgão de maturação de neutrófilos, essenciais contra fungos"],cor:1,let:"B",exp:"Timo = órgão linfoide PRIMÁRIO de maturação de LINFÓCITOS T. Sem timo: (1) sem seleção positiva/negativa, (2) sem T CD4+ maduro → sem comando da resposta adaptativa, (3) sem T CD8+ maduro → sem citotoxicidade. Vírus e fungos intracelulares requerem TH1 (IFN-γ → ativação de macrófagos) e CD8+ (killing de células infectadas). Anticorpos maternos (IgG via placenta) compensam parcialmente contra bactérias extracelulares, mas NÃO contra patógenos intracelulares.",dif:"Difícil",cat:"Órgãos Linfoides"},
{n:15,q:"No timo, apenas ~5% dos timócitos sobrevivem à maturação. O professor pergunta: 'O que acontece com os outros 95%?'<br><br>Qual o processo e sua finalidade na maturação tímica?",opts:["95% morrem por necrose devido a espaço insuficiente no timo","95% sofrem APOPTOSE durante seleção negativa (clones que reconhecem autoantígenos são deletados) e seleção positiva (clones que não reconhecem MHC próprio são eliminados por negligência), garantindo que apenas T cells com TCR funcional e NÃO-autorreativo saiam para a circulação","95% são exportados para o baço onde completam maturação","95% se diferenciam em células NK na medula tímica","95% são reciclados de volta à medula óssea como células-tronco"],cor:1,let:"B",exp:"Seleção tímica: (1) POSITIVA (córtex): timócitos devem reconhecer MHC próprio → os que não reconhecem morrem por negligência. (2) NEGATIVA (medula): timócitos que reagem FORTE contra autoantígenos → apoptose (deleção clonal) — corpúsculos de Hassall são evidência dessa destruição. Resultado: ~5% sobrevivem = T cells com TCR funcional + tolerante ao self. Esse é o mecanismo de TOLERÂNCIA CENTRAL. Falhas → autoimunidade.",dif:"Médio",cat:"Órgãos Linfoides"},
{n:16,q:"Mulher de 28 anos com linfonodomegalia cervical. Biópsia mostra centros germinativos ativos com proliferação de linfócitos B, hipermutação somática e troca de classe.<br><br>Qual a diferença fundamental entre linfonodo e baço como órgãos linfoides secundários?",opts:["Linfonodo é primário e baço é secundário","Linfonodo recebe antígenos dos TECIDOS via vasos linfáticos aferentes; baço filtra antígenos do SANGUE (não possui linfáticos aferentes). Ambos são órgãos linfoides secundários onde ocorre ativação da resposta adaptativa","Baço produz linfócitos T e linfonodo produz linfócitos B","Linfonodo contém apenas células T e baço apenas células B","Baço é órgão linfoide primário onde ocorre maturação de linfócitos B"],cor:1,let:"B",exp:"Órgãos linfoides SECUNDÁRIOS = onde ocorre ATIVAÇÃO (não maturação) de linfócitos: LINFONODO: linfáticos aferentes (mais que eferentes → retém células) → filtra antígenos de TECIDOS → células dendríticas trazem antígenos dos tecidos. BAÇO: filtra SANGUE → polpa branca (folículos B + zona T) = resposta imune; polpa vermelha = hemocateresis (remoção de hemácias velhas ~120 dias). Ambos possuem centros germinativos com B cells.",dif:"Médio",cat:"Órgãos Linfoides"},
{n:17,q:"Criança de 4 anos com amigdalites de repetição. O otorrino propõe amigdalectomia. O imunologista questiona a decisão, explicando a importância imunológica das tonsilas.<br><br>Qual o papel imunológico das tonsilas palatinas e por que sua remoção pode ser prejudicial?",opts:["Tonsilas produzem exclusivamente linfócitos T citotóxicos contra vírus respiratórios","Tonsilas fazem parte do MALT (NALTE — tecido linfoide associado à nasofaringe), compõem o Anel de Waldeyer e são reservatórios de linfócitos B produtores de IgA secretora que protege as mucosas das vias aéreas superiores","Tonsilas são órgãos linfoides primários onde T cells maturam","Tonsilas não têm função imunológica e podem ser removidas sem consequências","Tonsilas produzem complemento para defesa local"],cor:1,let:"B",exp:"Tonsilas = MALT (NALTE). Anel de Waldeyer: tonsila faríngea (adenoide, superior), palatinas (amígdalas, laterais), linguais (inferior). Função: reservatório de B que produz IgA secretora = proteção de mucosas. IgA = principal Ig das mucosas, não ativa complemento, não causa inflamação (proteção 'silenciosa'). Remoção desnecessária compromete defesa mucosa. Professor enfatiza: evitar amigdalectomia sem indicação clara.",dif:"Médio",cat:"Órgãos Linfoides"},
{n:18,q:"Paciente esplenectomizado após trauma apresenta sepse fulminante por <i>Streptococcus pneumoniae</i> (bactéria encapsulada) dois anos após a cirurgia.<br><br>Por que pacientes sem baço são particularmente vulneráveis a bactérias encapsuladas?",opts:["O baço é o único órgão que produz neutrófilos contra bactérias","O baço contém a zona marginal com linfócitos B especializados em responder a antígenos polissacarídicos T-independentes (cápsulas bacterianas) e macrófagos esplênicos que filtram bactérias opsonizadas do sangue; sem baço, bacteremias por encapsulados não são controladas","O baço produz todo o complemento do organismo","Sem baço, não há produção de IgE anti-bacteriana","O baço é necessário para a maturação de linfócitos T CD4+"],cor:1,let:"B",exp:"Baço = filtro de sangue. Zona marginal: B cells que respondem a polissacarídeos capsulares (T-independente) → IgM. Polpa vermelha: macrófagos que fagocitam bactérias opsonizadas. Sem baço: (1) sem filtro sanguíneo para bactérias, (2) sem B de zona marginal para anticápsulares rápidos. Encapsulados (pneumococo, H. influenzae, meningococo) resistem à fagocitose sem opsonização → sepse fulminante. Por isso: vacinação obrigatória pós-esplenectomia.",dif:"Difícil",cat:"Órgãos Linfoides"},

// ===== IV. CÉLULAS DO SISTEMA IMUNE (8 questões) =====
{n:19,q:"Paciente HIV+ com CD4 de 85/mm³ apresenta pneumonia por <i>Pneumocystis jirovecii</i>. Carga viral de 250.000 cópias/mL.<br><br><div class='lab'>• CD4+: 85 células/mm³<br>• Carga viral: 250.000 cópias/mL<br>• LDH sérico: elevado<br>• Lavado broncoalveolar: cistos de Pneumocystis<br>• Hemograma: linfopenia</div>Por que a destruição de CD4+ pelo HIV é tão catastrófica para o sistema imune?",opts:["CD4+ é o principal fagócito e sem ele não há fagocitose de fungos","O CD4+ é o COMANDANTE CENTRAL da resposta adaptativa: coordena ativação de CD8+ (citotoxicidade), macrófagos (via IFN-γ/TH1), linfócitos B (produção de anticorpos). Sem CD4+, nenhuma resposta adaptativa eficaz ocorre — Pneumocystis prolifera porque o eixo TH1/IFN-γ/macrófago alveolar colapsa","HIV destrói apenas NK cells, que são as únicas defesas contra fungos","CD4+ produz todos os anticorpos do organismo sozinho","HIV causa neutropenia severa, que permite infecções fúngicas"],cor:1,let:"B",exp:"CD4+ = 'maestro' do sistema imune. HIV infecta via GP120→CD4+coreceptor (CCR5/CXCR4). Com CD4<200: AIDS. Pneumocystis é controlado por TH1→IFN-γ→macrófago alveolar. Sem CD4+: (1) sem help para CD8 → sem killing viral, (2) sem TH1 → sem IFN-γ → macrófagos inativos → fungos oportunistas, (3) sem TFH → anticorpos de má qualidade. LDH elevado = dano tecidual pulmonar extenso.",dif:"Difícil",cat:"Células Imunes"},
{n:20,q:"Paciente com leucemia apresenta células tumorais que perderam a expressão de HLA classe I na superfície. Apesar disso, essas células são eliminadas por um tipo celular específico.<br><br>Qual célula é responsável por matar células que PERDERAM a expressão de MHC-I, e qual o mecanismo?",opts:["Linfócito T CD8+ reconhece a ausência de MHC-I e ativa apoptose","Célula NK (Natural Killer): reconhece a AUSÊNCIA de MHC-I como sinal de perigo ('missing self'). NK possui receptores inibitórios (KIR) que são desligados na ausência de MHC-I → libera perforina/granzima → apoptose da célula tumoral","Neutrófilo fagocita células sem MHC-I por opsonização","Linfócito B produz anticorpos contra a célula sem MHC-I","Célula dendrítica destrói diretamente tumores por fagocitose"],cor:1,let:"B",exp:"NK = imunidade INATA (não precisa de priming). Marcadores: CD16+, CD56+. Mecanismo: receptores inibitórios (KIR) reconhecem MHC-I → se MHC-I presente = sinal de segurança → NK não mata. Se MHC-I ausente ('missing self') = receptores inibitórios desligam → NK ativa → perforina/granzima (mesma via do CD8+). Diferença fundamental: CD8+ reconhece peptídeo+MHC-I (precisa de MHC-I presente). NK mata quando MHC-I está AUSENTE. Por isso são complementares na vigilância tumoral.",dif:"Médio",cat:"Células Imunes"},
{n:21,q:"O professor explica que a célula dendrítica é a 'rainha do sistema imune' e é considerada a APC mais importante, sendo 10x mais eficiente que macrófagos na apresentação de antígenos.<br><br>Qual a função única da célula dendrítica que a diferencia de outras APCs?",opts:["Célula dendrítica é a única célula que produz anticorpos","A célula dendrítica é a APC profissional mais eficiente, sendo a PONTE entre imunidade inata e adaptativa: captura antígenos nos tecidos periféricos, migra para linfonodos via linfáticos e apresenta tanto via MHC-I (cross-presentation a CD8+) quanto MHC-II (a CD4+), sendo essencial para INICIAR a resposta adaptativa primária","Célula dendrítica destrói patógenos exclusivamente por burst oxidativo","Célula dendrítica é a única célula que expressa HLA classe I","Célula dendrítica produz complemento localmente nos tecidos"],cor:1,let:"B",exp:"Célula dendrítica = PONTE inata↔adaptativa. Única APC capaz de: (1) iniciar resposta primária (ativar T naïve), (2) cross-presentation (apresentar antígenos exógenos via MHC-I a CD8+, além da via clássica MHC-II a CD4+). Macrófagos e B cells também são APCs, mas são 10x menos eficientes e geralmente ativam T já primados. Células de Langerhans = dendríticas da epiderme. Sem dendríticas, não há início eficiente da resposta adaptativa.",dif:"Médio",cat:"Células Imunes"},
{n:22,q:"Paciente com apendicite aguda. Hemograma:<br><br><div class='lab'>• Leucócitos: 18.500/mm³<br>• Neutrófilos segmentados: 75%<br>• Bastões: 12% (VR: 0-5%)<br>• Metamielócitos: 2%<br>• Linfócitos: 8%<br>• Eosinófilos: 0%</div>O residente identifica 'desvio à esquerda'. Qual a interpretação?",opts:["Aumento de linfócitos indicando infecção viral","Liberação precoce de formas IMATURAS de neutrófilos (bastões >5%, metamielócitos) pela medula óssea em resposta a G-CSF e IL-17 produzidos no foco infeccioso bacteriano agudo — a demanda tecidual excede a reserva de neutrófilos maduros","Aumento de eosinófilos por parasitose concomitante","Queda de plaquetas por consumo no foco inflamatório","Aumento de basófilos sugestivo de leucemia mieloide aguda"],cor:1,let:"B",exp:"Desvio à ESQUERDA = formas imaturas de neutrófilos no sangue (bastões >5%, metamielócitos, mielócitos). Em infecção bacteriana aguda: TNF-α + IL-1 + IL-6 + G-CSF + IL-17 (TH17) estimulam medula a liberar neutrófilos antes de completar maturação. Série de maturação: mieloblasto → promielócito → mielócito → metamielócito → bastão → segmentado. No hemograma: bastões 12% + metamielócitos 2% = desvio à esquerda clássico de infecção bacteriana aguda.",dif:"Médio",cat:"Células Imunes"},
{n:23,q:"Criança de 8 anos com verminose por <i>Ascaris lumbricoides</i>. Hemograma mostra eosinofilia de 18%.<br><br>Qual o papel do eosinófilo na defesa contra helmintos e qual a citocina/imunoglobulina envolvida?",opts:["Eosinófilos fagocitam helmintos inteiros e os digerem intracelularmente","Eosinófilos são recrutados pela resposta TH2 (IL-5 estimula produção/ativação) e desgranulam Proteína Básica Principal (MBP) sobre helmintos opsonizados por IgE, causando dano tóxico direto ao tegumento do parasita","Eosinófilos produzem IgE diretamente contra o helminto","Eosinófilos ativam a via do complemento pela via das lectinas contra helmintos","Eosinófilos liberam histamina como principal mediador anti-helmíntico"],cor:1,let:"B",exp:"Helmintos → TH2 → IL-4 (troca de classe para IgE) + IL-5 (produção/ativação de eosinófilos). IgE se liga ao helminto → eosinófilos com receptor FcεR reconhecem IgE → ADCC (citotoxicidade celular dependente de anticorpo) → desgranulação de MBP (Proteína Básica Principal), NÃO histamina. MBP é tóxica para o tegumento do helminto. Eosinofilia >5% no hemograma = pensar em parasitose ou alergia.",dif:"Médio",cat:"Células Imunes"},
{n:24,q:"Paciente com reação anafilática após picada de abelha. Apresenta urticária generalizada, broncoespasmo e hipotensão.<br><br>Qual célula tecidual é a principal responsável pela reação imediata e qual o mecanismo de ativação?",opts:["Neutrófilo libera enzimas lisossomais causando inflamação tecidual","Mastócito: IgE específica (produzida em exposição prévia) está ligada a receptores FcεRI na superfície do mastócito; na reexposição, o alérgeno faz ligação cruzada (cross-linking) de IgE → desgranulação → liberação de histamina, heparina e enzimas proteolíticas → vasodilatação, broncoconstrição, edema","Linfócito T CD8+ reconhece o veneno e destrói mastócitos por apoptose","Célula dendrítica secreta TNF-α em quantidades massivas causando choque","Basófilo libera complemento localmente no tecido"],cor:1,let:"B",exp:"Anafilaxia = hipersensibilidade tipo I. Mastócito = célula TECIDUAL (não circula, não aparece no hemograma). Localização: pele, mucosa GI, vias aéreas. Mecanismo: 1ª exposição → TH2 → IL-4 → B produz IgE → IgE se liga a FcεRI no mastócito (sensibilização). 2ª exposição → alérgeno faz cross-linking de IgE → desgranulação imediata → histamina (vasodilatação, broncoconstrição), heparina, triptase. Basófilo = equivalente CIRCULANTE do mastócito (sangue, não tecido).",dif:"Médio",cat:"Células Imunes"},
{n:25,q:"Sobre os marcadores CD de superfície celular, o professor afirma: 'CD3 é o marcador universal e exclusivo de linfócitos T.' Um aluno pergunta como diferenciar subtipos de T pelo imunofenotipagem.<br><br>Qual a combinação correta de marcadores para cada subtipo?",opts:["CD4+ = citotóxico; CD8+ = helper; CD3 = marcador de B","CD3+ CD4+ = T helper/auxiliar (reconhece MHC-II); CD3+ CD8+ = T citotóxico (reconhece MHC-I); CD3 é universal em TODOS os T; CD16+ CD56+ = NK (NÃO é T, NÃO tem CD3)","CD4+ = NK; CD8+ = helper; CD3 = marcador de eosinófilo","CD3+ CD4+ = T regulador exclusivamente; CD8+ não existe como subtipo funcional","Todos os linfócitos (T, B, NK) expressam CD3"],cor:1,let:"B",exp:"CD3 = UNIVERSAL e EXCLUSIVO de linfócitos T (nenhuma outra célula expressa). CD4+ = T helper → reconhece MHC-II em APCs. CD8+ = T citotóxico → reconhece MHC-I em qualquer célula nucleada. NK: CD16+ (FcγRIII, para ADCC) + CD56+ (adesão), SEM CD3 (não é T cell). Imunofenotipagem por citometria de fluxo usa esses marcadores para diagnóstico (leucemias, HIV/CD4 count).",dif:"Médio",cat:"Células Imunes"},
{n:26,q:"Paciente com tuberculose pulmonar forma granulomas caseosos no pulmão. O patologista explica que o granuloma é uma estrutura organizada de defesa.<br><br>Qual o mecanismo de formação do granuloma e quais células/citocinas são essenciais?",opts:["Neutrófilos se acumulam e formam abscessos que evoluem para granulomas","Macrófagos ativados por IFN-γ (via TH1/CD4+) tentam conter <i>M. tuberculosis</i> intracelular → macrófagos se fundem em células gigantes multinucleadas e epitelioides → T CD4+ circundam a estrutura → granuloma; a necrose caseosa central indica destruição tecidual pelo processo inflamatório crônico","Linfócitos B produzem anticorpos que precipitam e formam a estrutura granulomatosa","O complemento forma MAC no tecido pulmonar gerando a necrose caseosa","Eosinófilos desgranulam MBP no pulmão formando o granuloma"],cor:1,let:"B",exp:"Granuloma = resposta TH1 contra patógenos intracelulares persistentes. Mecanismo: macrófago fagocita M. tuberculosis → não consegue matar → apresenta a CD4+ → TH1 → IFN-γ → ativa macrófago → mesmo assim não elimina → macrófago vira epitelioide e célula gigante → CD4+ circunda → formação do granuloma = contenção, não eliminação. Em HIV (sem CD4): sem IFN-γ → sem granuloma → TB disseminada miliar.",dif:"Difícil",cat:"Células Imunes"},

// ===== V. IMUNIDADE INATA vs ADAPTATIVA E PRRs (5 questões) =====
{n:27,q:"Jovem de 19 anos com meningite. Líquor mostra diplococos Gram-negativos. O médico inicia antibioticoterapia imediata e explica que o sistema imune inato já está combatendo a infecção.<br><br><div class='lab'>• Líquor turvo<br>• Neutrófilos aumentados<br>• Proteína elevada<br>• Glicose diminuída<br>• Diplococos Gram-negativos</div>Qual receptor da imunidade inata reconhece o LPS deste patógeno Gram-negativo?",opts:["TCR do linfócito T CD4+ reconhece LPS diretamente","TLR4 em macrófagos e neutrófilos reconhece LPS (lipopolissacarídeo) da membrana externa de Gram-negativos → ativa NF-κB → produção de TNF-α, IL-1, IL-6 → inflamação aguda","BCR do linfócito B reconhece LPS e produz IgG imediatamente","MHC classe II apresenta LPS intacto ao CD8+","Receptor de complemento CR1 reconhece LPS sem necessidade de C3b"],cor:1,let:"B",exp:"LPS = PAMP clássico de Gram-negativos (Neisseria meningitidis). TLR4 = PRR (Pattern Recognition Receptor) da imunidade INATA. TLR4 reconhece LPS → via MyD88 → NF-κB → citocinas pró-inflamatórias. Cada TLR reconhece PAMPs específicos: TLR2 = peptidoglicano (Gram+), TLR4 = LPS (Gram-), TLR5 = flagelina, TLR7/8 = RNA viral, TLR9 = DNA CpG bacteriano. TCR e BCR são da imunidade ADAPTATIVA, não inata.",dif:"Médio",cat:"Imunidade Inata/PRRs"},
{n:28,q:"O professor pergunta aos alunos: 'Qual estrutura NÃO é reconhecida pelo sistema imune inato como PAMP?'<br><br>Opções apresentadas:",opts:["LPS (lipopolissacarídeo)","RNA dupla-fita viral","Flagelina bacteriana","Manose de superfície fúngica","Albumina sérica humana"],cor:4,let:"E",exp:"PAMPs (Pathogen-Associated Molecular Patterns) = moléculas EXCLUSIVAS de patógenos, ausentes em células humanas. LPS (Gram-), RNA dupla-fita (vírus), flagelina (bactérias móveis), manose (fungos/bactérias) = todos PAMPs reconhecidos por PRRs. Albumina sérica = proteína PRÓPRIA do organismo (self) → NÃO é PAMP. O sistema inato distingue self de non-self pela presença/ausência de PAMPs. DAMPs (Damage-Associated) são sinais de dano celular próprio.",dif:"Médio",cat:"Imunidade Inata/PRRs"},
{n:29,q:"O professor afirma: 'A imunidade inata e a adaptativa não são sistemas separados — trabalham de forma integrada.' Ele pede um exemplo de como a inata ativa a adaptativa.<br><br>Qual é o principal mecanismo de integração entre imunidade inata e adaptativa?",opts:["Anticorpos da imunidade adaptativa ativam TLRs da imunidade inata","A CÉLULA DENDRÍTICA captura antígenos nos tecidos (função inata: PRRs reconhecem PAMPs), processa-os, migra para linfonodos e apresenta peptídeos via MHC a linfócitos T naïve (ativação da resposta adaptativa) — é a ponte funcional entre os dois sistemas","Neutrófilos apresentam antígenos diretamente a linfócitos B nos linfonodos","O complemento ativa linfócitos T diretamente sem necessidade de APCs","Linfócitos NK produzem anticorpos quando a imunidade adaptativa falha"],cor:1,let:"B",exp:"Célula dendrítica = PONTE inata↔adaptativa. Fase inata: dendrítica nos tecidos usa PRRs (TLRs) para reconhecer PAMPs → captura antígeno → ativa-se (up-regula MHC-II e moléculas coestimulatórias B7). Fase de transição: migra via linfáticos aferentes → linfonodo. Fase adaptativa: apresenta peptídeo+MHC-II a T CD4+ naïve → ativação → expansão clonal → resposta adaptativa. Sem essa ponte, a imunidade adaptativa não inicia eficientemente.",dif:"Médio",cat:"Imunidade Inata/PRRs"},
{n:30,q:"Compare infecção e inflamação. O professor dá o exemplo: 'Uma queimadura extensa causa inflamação intensa, mas não há infecção inicialmente.'<br><br>Qual a distinção correta e quais sinais cardinais caracterizam a inflamação?",opts:["Infecção e inflamação são sinônimos — toda inflamação pressupõe presença de microrganismo","Infecção = presença de microrganismo patogênico; Inflamação = resposta tecidual que pode ocorrer COM ou SEM infecção (estéril). Sinais cardinais: calor, rubor (vasodilatação), tumor/edema (permeabilidade vascular), dor (mediadores), perda de função. Exemplos estéreis: queimadura, infarto, trauma, autoimunidade","Inflamação é sempre mais grave que infecção","Infecção é resposta do sistema inato e inflamação é da adaptativa","Inflamação só ocorre quando há febre sistêmica"],cor:1,let:"B",exp:"Infecção ≠ Inflamação. Infecção = microrganismo invadindo tecido. Inflamação = resposta TECIDUAL a agressão (pode ser infecciosa ou estéril). Sinais cardinais (Celsius + Virchow): (1) Calor (vasodilatação), (2) Rubor (hiperemia), (3) Tumor/Edema (permeabilidade vascular), (4) Dor (bradicinina, prostaglandinas), (5) Perda de função. Queimadura, infarto, trauma = inflamação SEM infecção. Conceito fundamental para não tratar toda inflamação com antibiótico.",dif:"Médio",cat:"Imunidade Inata/PRRs"},
{n:31,q:"Paciente diabético com candidíase oral recorrente. Investigação mostra deficiência funcional de TH17.<br><br>Por que a deficiência de TH17 predispõe especificamente a infecções fúngicas e bacterianas extracelulares agressivas?",opts:["TH17 produz IFN-γ que ativa macrófagos contra fungos intracelulares","TH17 produz IL-17 que recruta NEUTRÓFILOS em massa para o sítio de infecção; sem IL-17, não há recrutamento neutrofílico eficiente → fungos (Candida) e bactérias extracelulares agressivas (Staphylococcus, Pseudomonas) proliferam sem controle","TH17 produz IL-4 que estimula IgE contra fungos","TH17 ativa diretamente o complemento pela via alternativa","TH17 produz IL-10 que suprime a resposta inflamatória excessiva"],cor:1,let:"B",exp:"Subtipos TH e suas citocinas: TH1→IFN-γ (intracelulares, macrófago), TH2→IL-4/IL-5 (helmintos, alergia, IgE), TH17→IL-17 (bactérias extracelulares agressivas, fungos, neutrófilos). IL-17 = principal recrutador de neutrófilos. Candida é controlada por eixo TH17/neutrófilos. Deficiência de TH17 → candidíase mucocutânea crônica. IL-10 é de Treg, não TH17.",dif:"Médio",cat:"Imunidade Inata/PRRs"},

// ===== VI. IMUNOGLOBULINAS (5 questões) =====
{n:32,q:"Lactente de 8 meses em aleitamento materno apresenta gastroenterite por rotavírus. A mãe pergunta qual proteção o leite oferece.<br><br>Qual imunoglobulina do leite materno protege mucosas e como atua?",opts:["IgG do leite atravessa a mucosa e neutraliza vírus no sangue do bebê","IgA secretora (sIgA) reveste a mucosa intestinal, liga-se a patógenos impedindo adesão e penetração (exclusão imune), neutraliza toxinas e vírus — SEM ativar complemento e SEM causar inflamação (proteção silenciosa)","IgM pentamérica do leite lisa rotavírus por ativação do complemento intestinal","IgE do leite sensibiliza mastócitos intestinais que desgranulam contra rotavírus","IgD do colostro ativa B cells do MALT do bebê para produção de anticorpos próprios"],cor:1,let:"B",exp:"IgA secretora = principal Ig de mucosas e do leite/colostro. Características: (1) dimérica com componente secretor, (2) resiste a proteases intestinais, (3) NÃO ativa complemento (fundamental para não inflamar mucosa do bebê), (4) exclusão imune = impede adesão de patógenos. IgG atravessa PLACENTA (via FcRn), não mucosa intestinal. IgM é grande demais para secreção eficiente.",dif:"Médio",cat:"Imunoglobulinas"},
{n:33,q:"RN de mãe Rh-negativa (2º filho Rh+) nasce com anemia hemolítica grave. Coombs direto positivo (IgG anti-D).<br><br><div class='lab'>• Hb neonatal: 8,2 g/dL<br>• Bilirrubina indireta: 18 mg/dL<br>• Coombs direto: positivo (IgG)<br>• Reticulócitos: elevados</div>Por que a doença ocorre no 2º filho e não no 1º?",opts:["Na 1ª gestação: hemácias Rh+ fetais sensibilizam a mãe → resposta primária = IgM (NÃO cruza placenta). Na 2ª gestação: reexposição → resposta secundária → B de memória → IgG anti-D (monomérica, CRUZA placenta via FcRn) → opsoniza hemácias fetais → hemólise","O primeiro feto não expressa Rh por imaturidade","A mãe só produz anticorpos após o segundo parto","O complemento materno só ativa na segunda gestação","O primeiro filho era Rh-negativo"],cor:0,let:"A",exp:"Integra: memória imunológica + classes de Ig + transferência placentária. 1ª gestação: sensibilização → IgM (pentamérica, grande, NÃO cruza placenta) → 1º filho nasce bem. 2ª gestação: reexposição → B de memória → IgG (monomérica, cruza placenta via receptor FcRn neonatal) → opsoniza hemácias Rh+ → hemólise → DHRN. RhoGAM (anti-D) previne sensibilização: destrói hemácias Rh+ fetais na circulação materna antes de ativarem B cells.",dif:"Difícil",cat:"Imunoglobulinas"},
{n:34,q:"Estudante recebe 2ª dose da vacina contra hepatite B. Após 3 semanas, anti-HBs IgG está elevado com alta avidez.<br><br><div class='lab'>• Após 1ª dose: anti-HBs IgM baixo, IgG mínimo<br>• Após 2ª dose: anti-HBs IgG elevado, IgM mínimo<br>• Avidez do anti-HBs: alta</div>Qual o mecanismo da resposta secundária?",opts:["A 2ª dose contém mais antígeno, ativando mais B naïve","B e T de memória gerados na resposta primária são reativados rapidamente; B de memória já sofreu troca de classe (IgM→IgG) e hipermutação somática nos centros germinativos → anticorpos de alta afinidade sem necessidade de novo processamento completo","O adjuvante da 2ª dose é diferente e mais potente","NK de memória reconhecem o antígeno e ativam B diretamente","A 2ª dose ativa exclusivamente complemento pela via clássica"],cor:1,let:"B",exp:"Resposta primária (1ª dose): B naïve → ativação lenta (~7 dias) → IgM → centro germinativo: troca de classe + hipermutação somática + seleção por afinidade → gera B de memória + plasmócitos de vida longa. Resposta secundária (2ª dose): B de memória (já com BCR de alta afinidade após hipermutação) + T de memória → ativação RÁPIDA (~1-3 dias) → IgG de alta avidez → pico maior. Fundamento de esquemas vacinais com reforço (booster).",dif:"Médio",cat:"Imunoglobulinas"},
{n:35,q:"Paciente com mieloma múltiplo produz quantidades massivas de IgG monoclonal. O professor aproveita para revisar a estrutura básica dos anticorpos.<br><br>Qual a estrutura fundamental de uma imunoglobulina IgG?",opts:["Uma cadeia pesada simples ligada a um antígeno","Duas cadeias pesadas + duas cadeias leves ligadas por pontes dissulfeto; região variável (Fab) = ligação ao antígeno (determina especificidade); região constante (Fc) = função efetora (ligação a receptores Fc, ativação de complemento, transferência placentária)","Cinco subunidades pentaméricas com cadeia J","Estrutura linear sem dobramento tridimensional","Uma cadeia pesada sem cadeia leve e sem pontes dissulfeto"],cor:1,let:"B",exp:"IgG = monomérica (1 unidade). Estrutura: 2 cadeias pesadas (H) + 2 cadeias leves (L, κ ou λ) = forma de Y. Fab (Fragment antigen binding) = região variável = especificidade. Fc (Fragment crystallizable) = região constante = funções efetoras: (1) liga receptores Fc em fagócitos → opsonização, (2) ativa C1q → via clássica, (3) cruza placenta via FcRn. IgM = pentamérica (5 unidades + cadeia J). IgA secretora = dimérica + componente secretor.",dif:"Médio",cat:"Imunoglobulinas"},
{n:36,q:"O professor pergunta: 'IgM aparece primeiro na infecção. Qual seu significado clínico e por que é substituída por IgG?'<br><br>Compare IgM e IgG como marcadores clínicos:",opts:["IgM e IgG aparecem simultaneamente e têm a mesma função","IgM = pentamérica, é a PRIMEIRA na resposta primária, indica FASE AGUDA, tem baixa afinidade mas alta avidez (10 sítios); IgG = monomérica, aparece na resposta secundária após troca de classe no centro germinativo, indica MEMÓRIA/IMUNIDADE, tem alta afinidade após hipermutação somática","IgM é monomérica e IgG é pentamérica","IgM indica imunidade de longa duração e IgG indica infecção aguda","IgM cruza a placenta e IgG não"],cor:1,let:"B",exp:"IgM: pentamérica (5 unidades, 10 sítios de ligação → alta AVIDEZ apesar de baixa afinidade individual), primeiro anticorpo produzido, NÃO cruza placenta. Marcador de infecção AGUDA. IgG: monomérica, alta afinidade (após hipermutação somática), cruza placenta (FcRn), mais abundante no soro. Marcador de imunidade/fase crônica. A troca IgM→IgG requer TFH no centro germinativo (por isso antígenos T-independentes ficam em IgM).",dif:"Médio",cat:"Imunoglobulinas"},

// ===== VII. CITOCINAS E SUBTIPOS TH (5 questões) =====
{n:37,q:"Paciente com tuberculose pulmonar. O médico explica que o controle da TB depende criticamente de uma citocina que ativa macrófagos.<br><br>Qual subtipo de T helper e citocina são essenciais para o controle de patógenos intracelulares como <i>M. tuberculosis</i>?",opts:["TH2 / IL-4 → ativa B cells para produção de IgE anti-TB","TH1 / IFN-γ → ativa macrófagos para killing de patógenos intracelulares via burst oxidativo e enzimas lisossomais; sem IFN-γ (como na AIDS), não há formação de granuloma e TB dissemina","TH17 / IL-17 → recruta neutrófilos para matar M. tuberculosis","Treg / IL-10 → suprime a inflamação excessiva controlando a TB","TFH / IL-21 → estimula anticorpos neutralizantes anti-TB"],cor:1,let:"B",exp:"Patógenos INTRACELULARES (vírus, micobactérias, protozoários intracelulares) → TH1. TH1 produz IFN-γ = principal citocina ativadora de macrófagos. Macrófago ativado: (1) burst oxidativo potencializado, (2) fusão fagolisossomo, (3) NO (óxido nítrico). Se não resolve: granuloma (macrófagos epitelioides + células gigantes + T CD4+). HIV sem CD4 → sem TH1 → sem IFN-γ → sem granuloma → TB miliar disseminada.",dif:"Médio",cat:"Citocinas/TH"},
{n:38,q:"Gestante de 32 semanas com pré-eclâmpsia. O obstetra explica que a gestação normal requer equilíbrio imunológico na interface materno-fetal para tolerar antígenos paternos do feto.<br><br>Qual o perfil imunológico predominante na gestação normal?",opts:["TH1 com IFN-γ protegendo o feto contra infecções","Predominância TH2 (IL-4, IL-10) e Treg na interface materno-fetal, mediada pela progesterona, que suprime TH1 citotóxico; desequilíbrio para TH1 está associado a pré-eclâmpsia e aborto espontâneo","Imunossupressão total materna — sistema imune completamente inativo","O feto não expressa HLA algum, sendo invisível ao sistema materno","IgE materna forma barreira protetora na placenta"],cor:1,let:"B",exp:"Gestação normal = desvio TH2/Treg na interface placentária. Progesterona favorece: (1) TH2 (IL-4, IL-10 = anti-inflamatórias), (2) Treg (tolerância ativa), (3) supressão de TH1 (IFN-γ, TNF-α = citotóxicas). Trofoblasto expressa HLA-G (não-clássico) que inibe NK uterinas. Se TH1 predomina → citocinas pró-inflamatórias → dano endotelial → pré-eclâmpsia. NÃO é imunossupressão total — a mãe mantém imunidade sistêmica funcional.",dif:"Difícil",cat:"Citocinas/TH"},
{n:39,q:"Paciente asmático apresenta broncoespasmo recorrente com eosinofilia no escarro. O alergologista explica que a asma alérgica é mediada pelo perfil TH2.<br><br>Qual a rede de citocinas envolvida na resposta alérgica TH2?",opts:["IFN-γ ativa eosinófilos e IL-17 recruta mastócitos","IL-4 induz troca de classe para IgE nos linfócitos B; IL-5 estimula produção e ativação de eosinófilos na medula; IL-13 contribui para hipersecreção de muco e remodelamento brônquico — conjunto que define a resposta TH2 alérgica","TNF-α ativa diretamente os eosinófilos e IL-10 estimula IgE","IL-17 é a citocina central da alergia e recruta basófilos","IL-2 estimula mastócitos e IL-6 produz IgE"],cor:1,let:"B",exp:"Rede TH2: IL-4 = troca de classe B → IgE + diferenciação TH2. IL-5 = eosinófilos (produção, ativação, sobrevida). IL-13 = muco, fibrose, remodelamento. IgE → mastócitos/basófilos (via FcεRI). Resultado: broncoespasmo (histamina), inflamação eosinofílica, hipersecreção mucosa. TH1 = IFN-γ (intracelulares). TH17 = IL-17 (neutrófilos, bactérias). Treg = IL-10, TGF-β (supressão). Tabela de citocinas é obrigatória para a prova.",dif:"Médio",cat:"Citocinas/TH"},
{n:40,q:"O professor apresenta a seguinte tabela e pede para completá-la:<br><br><div class='lab'>TH1 → citocina principal: ? → alvo: patógenos ?<br>TH2 → citocina principal: ? → alvo: ? e alergia<br>TH17 → citocina principal: ? → recruta: ?<br>Treg → citocinas: ? → função: ?</div>Qual o preenchimento correto?",opts:["TH1→IL-4→extracelulares; TH2→IFN-γ→intracelulares; TH17→IL-10→macrófagos; Treg→IL-17→inflamação","TH1→IFN-γ→intracelulares (vírus, micobactérias); TH2→IL-4/IL-5→helmintos e alergia; TH17→IL-17→recruta neutrófilos (bactérias extracelulares agressivas, fungos); Treg→IL-10/TGF-β→supressão/regulação imunológica","TH1→IL-17→fungos; TH2→TNF-α→bactérias; TH17→IFN-γ→vírus; Treg→IL-4→ativação","TH1→IL-5→eosinófilos; TH2→IL-17→neutrófilos; TH17→IL-10→supressão; Treg→IFN-γ→ativação","Todos os subtipos produzem as mesmas citocinas"],cor:1,let:"B",exp:"Tabela essencial: TH1→IFN-γ→ativa macrófagos→patógenos INTRACELULARES (TB, vírus, Leishmania). TH2→IL-4 (IgE), IL-5 (eosinófilos), IL-13→HELMINTOS e ALERGIA. TH17→IL-17→recruta NEUTRÓFILOS→bactérias extracelulares AGRESSIVAS (Staph, Pseudo) e FUNGOS (Candida). Treg→IL-10, TGF-β→SUPRESSÃO, tolerância, previne autoimunidade. TFH→IL-21→help para B no centro germinativo. Esta tabela é cobrável em qualquer formato de questão.",dif:"Médio",cat:"Citocinas/TH"},
{n:41,q:"Paciente em uso de infliximabe (anti-TNF-α) para doença de Crohn desenvolve tuberculose pulmonar reativada. O médico explica que o TNF-α é essencial para manter granulomas quiescentes.<br><br>Por que o bloqueio de TNF-α causou reativação de TB?",opts:["Anti-TNF-α inibiu a produção de anticorpos anti-TB","TNF-α é essencial para: (1) manter a integridade do granuloma que contém <i>M. tuberculosis</i> latente, (2) recrutar e ativar macrófagos, (3) sinergizar com IFN-γ na resposta TH1. Ao bloquear TNF-α, o granuloma se desorganiza → M. tuberculosis escapa → reativação de TB latente","Anti-TNF-α causou neutropenia e a TB é controlada por neutrófilos","O infliximabe é diretamente tóxico para macrófagos alveolares","Anti-TNF-α ativou TH2 que suprime a resposta contra TB"],cor:1,let:"B",exp:"TNF-α = citocina pró-inflamatória chave produzida por macrófagos. No granuloma: TNF-α + IFN-γ mantêm macrófagos ativados → contêm TB latente. Anti-TNF-α (infliximabe, adalimumabe): (1) granuloma perde coesão, (2) macrófagos desativam, (3) M. tuberculosis escapa → reativação. Por isso: rastreio obrigatório de TB latente (PPD/IGRA) antes de iniciar anti-TNF-α. Se positivo: tratar TB latente primeiro.",dif:"Difícil",cat:"Citocinas/TH"},

// ===== VIII. MEMÓRIA IMUNOLÓGICA E VACINAÇÃO (5 questões) =====
{n:42,q:"Edward Jenner em 1796 inoculou o menino James Phipps com material de cowpox (varíola bovina). Semanas depois, inoculou com varíola humana e o menino não adoeceu.<br><br>Qual princípio imunológico fundamental Jenner demonstrou sem saber?",opts:["Que anticorpos podem ser transferidos de vaca para humano","Que a exposição a um antígeno relacionado (cowpox) gera MEMÓRIA IMUNOLÓGICA com reatividade cruzada contra o patógeno real (varíola humana), permitindo resposta secundária rápida e protetora na reexposição — fundamento de toda vacinação","Que a varíola bovina mata o vírus da varíola humana por competição","Que o sistema complemento da vaca protege contra varíola humana","Que a vacinação gera tolerância imunológica ao patógeno"],cor:1,let:"B",exp:"Jenner demonstrou: (1) MEMÓRIA IMUNOLÓGICA — 1ª exposição (cowpox) gera células de memória que respondem rapidamente na 2ª exposição (varíola), (2) REATIVIDADE CRUZADA — antígenos de cowpox são similares o suficiente aos de varíola para gerar proteção cruzada. 'Vacina' vem do latim 'vacca' (vaca). Este é o princípio de TODA vacinação: simular infecção primária → gerar memória → proteção na exposição real.",dif:"Médio",cat:"Memória/Vacinação"},
{n:43,q:"Criança de 2 anos recebe vacina pneumocócica conjugada (PCV13). O pediatra explica que a vacina polissacarídica pura não funciona bem em menores de 2 anos.<br><br>Qual a justificativa imunológica para usar vacinas conjugadas em crianças?",opts:["Crianças <2 anos não possuem linfócitos B","Polissacarídeos ativam B de forma T-INDEPENDENTE (sem TFH) → apenas IgM, curta duração, sem memória. Crianças <2 anos têm zona marginal esplênica imatura. Vacina conjugada (polissacarídeo + proteína carreadora) CONVERTE resposta em T-DEPENDENTE → TFH→troca de classe (IgG), hipermutação somática, memória de longa duração","A vacina polissacarídica tem adjuvantes tóxicos para crianças","Anticorpos maternos neutralizam polissacarídeos mas não conjugados","A conjugada ativa apenas NK, que são mais maduras em crianças"],cor:1,let:"B",exp:"T-independente: polissacarídeo→B direto→IgM apenas, sem memória, sem troca de classe. Zona marginal (B especializados em T-independentes) = imatura em <2 anos → resposta ruim. CONJUGADA: polissacarídeo + proteína → B internaliza conjugado → processa PROTEÍNA → apresenta via MHC-II a TFH → CD40L + IL-21 → troca de classe (IgG), hipermutação somática, memória. Converte T-independente em T-dependente. Princípio fundamental de vacinologia pediátrica.",dif:"Difícil",cat:"Memória/Vacinação"},
{n:44,q:"Após infecção por sarampo, o paciente desenvolve imunidade duradoura. Décadas depois, reexposição ao vírus não causa doença.<br><br>Qual o substrato celular da memória imunológica de longa duração?",opts:["Neutrófilos de memória que patrulham mucosas respiratórias","Plasmócitos de vida longa na medula óssea que secretam continuamente anticorpos em baixos títulos + linfócitos B e T de memória que são reativados rapidamente na reexposição ao antígeno","Macrófagos que armazenam antígeno por décadas nos linfonodos","Células dendríticas que mantêm fragmentos virais indefinidamente","Complemento sérico que reconhece sarampo permanentemente"],cor:1,let:"B",exp:"Memória imunológica de longa duração: (1) Plasmócitos de vida longa → migram para medula óssea → secretam anticorpos continuamente por décadas (mantêm título sérico basal), (2) B de memória → no sangue e tecidos linfoides → reativação rápida se antígeno reaparece → resposta secundária (IgG alta afinidade), (3) T de memória → central (linfonodos) e efetora (tecidos). Vacinação mimetiza este processo sem causar doença.",dif:"Médio",cat:"Memória/Vacinação"},
{n:45,q:"Paciente HIV+ com CD4 <200 desenvolve TB miliar disseminada sem formação de granulomas. Em paciente imunocompetente, a TB fica contida em granulomas.<br><br>Compare a resposta imune à TB em paciente imunocompetente vs HIV+ sem CD4:",opts:["Imunocompetente e HIV+ respondem igualmente, a diferença é a virulência da cepa","IMUNOCOMPETENTE: macrófago fagocita TB → apresenta a CD4+ → TH1 → IFN-γ → ativa macrófago → granuloma contém TB. HIV+ SEM CD4: sem TH1 → sem IFN-γ → macrófago não ativa → sem granuloma → TB dissemina livremente (miliar) por todos os órgãos","HIV+ não tem macrófagos, apenas CD4+","A TB em HIV+ é resistente a antibióticos por mutação viral","O complemento do HIV+ destrói os granulomas formados"],cor:1,let:"B",exp:"TB = paradigma da importância do CD4+/TH1. Normal: macrófago + CD4/TH1 + IFN-γ → granuloma = contenção. AIDS: sem CD4 → sem comando TH1 → sem IFN-γ → macrófagos não ativam → sem granuloma → TB escapa e dissemina (miliar: sementes de milho distribuídas nos pulmões/fígado/baço). O macrófago EXISTE em ambos os casos, mas sem IFN-γ ele é ineficaz. Demonstra que CD4+ é o comandante central.",dif:"Difícil",cat:"Memória/Vacinação"},
{n:46,q:"O professor explica a diferença entre tolerância central e periférica:<br><br>'A tolerância central ocorre no timo e medula óssea. A periférica ocorre nos tecidos e linfonodos.'<br><br>Qual mecanismo garante tolerância PERIFÉRICA quando células autorreativas escapam da seleção tímica?",opts:["Anticorpos IgG destroem células T autorreativas na circulação","Linfócitos T reguladores (Treg) produzem IL-10 e TGF-β que suprimem linfócitos T autorreativos que escaparam da tolerância central; adicionalmente, anergia (falta de coestimulação CD28/B7) e deleção periférica (apoptose via Fas/FasL) são mecanismos complementares","Neutrófilos fagocitam linfócitos autorreativos nos tecidos","A tolerância periférica não existe — toda autorreatividade é eliminada no timo","O complemento lisa células T autorreativas por via alternativa"],cor:1,let:"B",exp:"Tolerância CENTRAL: timo (T) e medula óssea (B) → seleção negativa → deleta autorreativos (95% morrem). Mas ~5% sobrevive = NÃO perfeito → alguns autorreativos escapam. Tolerância PERIFÉRICA: (1) Treg → IL-10/TGF-β → supressão ativa, (2) Anergia → T encontra antígeno SEM sinal 2 (CD28/B7) → não ativa → torna-se anérgico, (3) Deleção periférica → apoptose por Fas/FasL. Falha em tolerância periférica → autoimunidade. Moléculas coestimulatórias: CD28 (ativação) vs CTLA-4 (inibição, freio).",dif:"Difícil",cat:"Memória/Vacinação"},

// ===== IX. MICROBIOTA (3 questões) =====
{n:47,q:"Paciente de 55 anos usa enxaguante bucal antisséptico 4x/dia há 2 anos. Desenvolve candidíase oral e infecções respiratórias de repetição.<br><br>Qual conceito imunológico explica isso?",opts:["O antisséptico é imunossupressor sistêmico","Disbiose: antisséptico excessivo elimina bactérias comensais da MICROBIOTA oral → perda de resistência à colonização (competição por nicho) + perda de estímulo imune local (TH17/IL-17 para neutrófilos, IgA secretora); Candida, sendo oportunista, prolifera no nicho vazio","Candida é resistente a todos os antissépticos","O tabagismo é o único fator, a nicotina nutre Candida","Candidíase é por deficiência genética de complemento"],cor:1,let:"B",exp:"MICROBIOTA (≠ microbioma: microbiota = organismos; microbioma = genoma coletivo — professor enfatiza que só 'microbiota' é aceito na prova). Funções: (1) resistência à colonização (competição por nutrientes/adesão), (2) estímulo imune local (TH17→IL-17→neutrófilos antifúngicos + IgA). Antisséptico excessivo = disbiose → perda das duas funções → oportunistas (Candida) proliferam. Conceito similar: antibióticos → diarreia por C. difficile.",dif:"Médio",cat:"Microbiota"},
{n:48,q:"O professor pergunta: 'Qual a diferença entre microbiota e microbioma? Eu só aceito um termo na prova.'<br><br>Qual a definição correta e qual termo o professor exige?",opts:["Microbioma = os organismos; microbiota = os genes; o professor exige 'microbioma'","MICROBIOTA = conjunto de microrganismos que habitam determinada região do corpo; MICROBIOMA = o genoma coletivo desses microrganismos (conjunto de genes). O professor exige 'MICROBIOTA' para se referir aos organismos em si","Os termos são sinônimos intercambiáveis sem distinção","Microbiota refere-se apenas a bactérias; microbioma inclui vírus e fungos","Microbioma é usado em imunologia e microbiota em microbiologia"],cor:1,let:"B",exp:"Distinção cobrada na prova: MICROBIOTA = os organismos vivos (bactérias, fungos, vírus, protozoários) que habitam uma região corporal. MICROBIOMA = o conjunto de GENES desses organismos (genômica). Na linguagem cotidiana são usados como sinônimos, mas tecnicamente são diferentes. O professor enfatizou nas aulas que usa e exige 'microbiota' quando se refere aos organismos. Erro comum em provas: trocar os termos.",dif:"Médio",cat:"Microbiota"},
{n:49,q:"A microbiota vaginal normal é dominada por Lactobacillus spp. Uma paciente em uso prolongado de antibióticos de amplo espectro desenvolve vaginose bacteriana.<br><br>Qual o mecanismo de proteção dos lactobacilos e por que o antibiótico causou vaginose?",opts:["Lactobacilos produzem IgA local que neutraliza patógenos vaginais","Lactobacillus produz ácido lático → pH vaginal ácido (~3,8-4,5) que inibe crescimento de patógenos + compete por adesão ao epitélio; antibiótico de amplo espectro mata lactobacilos → pH sobe → patógenos oportunistas (Gardnerella vaginalis) proliferam → vaginose","Lactobacilos ativam complemento pela via das lectinas no canal vaginal","Os antibióticos causam vaginose por toxicidade direta ao epitélio vaginal","Lactobacilos produzem histamina que mata bactérias patogênicas"],cor:1,let:"B",exp:"Microbiota vaginal: Lactobacillus dominante → ácido lático → pH ácido = barreira contra patógenos. Antibiótico amplo espectro: mata lactobacilos → pH sobe → Gardnerella, anaeróbios oportunistas proliferam → vaginose. Professor circulou a microbiota vaginal na aula como exemplo importante. Conceito geral: microbiota = defesa por competição + produção de substâncias antimicrobianas + manutenção de pH + estímulo imune local.",dif:"Médio",cat:"Microbiota"},

// ===== X. HEMOGRAMA E HEMATOLOGIA (5 questões) =====
{n:50,q:"Paciente com quadro gripal apresenta o seguinte hemograma:<br><br><div class='lab'>• Leucócitos: 4.200/mm³<br>• Neutrófilos: 35%<br>• Linfócitos: 55%<br>• Monócitos: 8%<br>• Eosinófilos: 1%<br>• Basófilos: 1%</div>Qual a interpretação deste hemograma e por que infecções virais apresentam esse padrão?",opts:["Leucocitose com neutrofilia indica infecção bacteriana aguda","LINFOCITOSE RELATIVA (55%) com leucopenia leve e neutropenia relativa — padrão típico de infecção VIRAL. Vírus estimulam expansão clonal de linfócitos T CD8+ e NK, e causam marginalização de neutrófilos; a resposta antiviral é predominantemente celular (T-dependente), não neutrofílica","Eosinofilia indica parasitose concomitante ao quadro gripal","Monocitose indica infecção fúngica sistêmica","Basofilia indica reação alérgica ao vírus"],cor:1,let:"B",exp:"Padrão VIRAL: leucócitos normais/diminuídos + LINFOCITOSE (>40%) + neutropenia relativa. Mecanismo: vírus → expansão de CD8+ (citotóxicos antivirais) + NK + produção de IFN-α/β → predomínio linfocitário. Padrão BACTERIANO: leucocitose + NEUTROFILIA (>70%) + desvio à esquerda. Padrão PARASITÁRIO: EOSINOFILIA (>5%). Padrão ALÉRGICO: eosinofilia + basofilia. Saber interpretar hemograma por padrão infeccioso é fundamental para a prova.",dif:"Médio",cat:"Hemograma"},
{n:51,q:"O professor mostra uma lâmina com neutrófilos hipersegmentados (núcleos com >5 lobos) e pergunta a causa.<br><br>O que a hipersegmentação nuclear de neutrófilos indica?",opts:["Infecção bacteriana aguda grave com desvio à esquerda","Deficiência de vitamina B12 e/ou ácido fólico → anemia megaloblástica; a deficiência prejudica a síntese de DNA → divisão nuclear retardada enquanto o citoplasma continua maturando → núcleo hipersegmentado (>5 lobos, normal = 3-5)","Infecção viral com linfocitose reativa","Leucemia mieloide crônica em fase blástica","Reação alérgica grave com eosinofilia"],cor:1,let:"B",exp:"Hipersegmentação = >5 lobos nucleares. Causa: deficiência de B12 e/ou folato → síntese de DNA prejudicada → célula não divide adequadamente → núcleo acumula lobos. Associação: anemia megaloblástica (VCM alto). OPOSTO do desvio à esquerda (formas imaturas com poucos lobos). Desvio à esquerda = bastões, metamielócitos = infecção aguda/leucemia. Hipersegmentação = deficiência vitamínica = megaloblástica.",dif:"Médio",cat:"Hemograma"},
{n:52,q:"Atleta que treina em alta altitude por 6 semanas apresenta policitemia (aumento de hemácias). O hemograma mostra:<br><br><div class='lab'>• Hemácias: 6,2 milhões/mm³ (VR: 4,5-5,5)<br>• Hemoglobina: 18,5 g/dL<br>• Hematócrito: 55%</div>Qual citocina/hormônio explica a policitemia e qual o mecanismo?",opts:["G-CSF estimula produção de hemácias em altitude","ERITROPOETINA (EPO): rins detectam hipóxia (baixa pO₂ em altitude) → produzem EPO → EPO estimula progenitores eritroides na medula óssea → aumento de produção de hemácias → policitemia fisiológica adaptativa","Trombopoetina estimula hemácias em resposta ao frio da altitude","IL-5 estimula eritroblastos por via eosinofílica cruzada","TNF-α causa eritrocitose inflamatória em altitude"],cor:1,let:"B",exp:"EPO (eritropoetina) = fator de crescimento hematopoético para linhagem eritroide. Células peritubulares renais detectam pO₂ → se hipóxia (altitude, anemia, doença pulmonar) → aumentam EPO → medula produz mais hemácias. EPO recombinante: usada em anemia de doença renal crônica (rins doentes não produzem EPO). Também é doping em esportes. G-CSF = granulócitos. M-CSF = monócitos. Trombopoetina = plaquetas. IL-5 = eosinófilos.",dif:"Médio",cat:"Hemograma"},
{n:53,q:"Paciente com plaquetas de 15.000/mm³ (VR: 150.000-450.000) apresenta petéquias e equimoses espontâneas.<br><br>Qual a nomenclatura correta para esta alteração e a partir de qual valor o risco de sangramento se torna crítico?",opts:["Trombocitose — risco surge acima de 500.000","TROMBOCITOPENIA — plaquetas abaixo de 150.000/mm³. Risco de sangramento significativo com <50.000; risco crítico (sangramento espontâneo, hemorragia intracraniana) com <20.000. Sufixo -PENIA = diminuição; -FILIA/-CITOSE = aumento","Neutropenia — plaquetas são neutrófilos modificados","Leucopenia — toda diminuição celular no sangue recebe este nome","Anemia — plaquetas baixas causam anemia"],cor:1,let:"B",exp:"Nomenclatura hematológica: -FILIA/-CITOSE = aumento; -PENIA = diminuição. Trombocitopenia = plaquetas <150.000. Trombocitose = >450.000. Sangramento: <100.000 = risco cirúrgico; <50.000 = sangramento espontâneo possível; <20.000 = risco crítico (petéquias, equimoses, hemorragia intracraniana). Plaquetas são fragmentos de MEGACARIÓCITOS (célula gigante da medula), regulados por TROMBOPOETINA.",dif:"Médio",cat:"Hemograma"},
{n:54,q:"O professor apresenta a série de maturação neutrofílica e pergunta qual achado no hemograma diferencia infecção bacteriana aguda de leucemia mieloide:<br><br><div class='lab'>Mieloblasto → Promielócito → Mielócito → Metamielócito → Bastão → Segmentado</div>",opts:["Na infecção bacteriana aparecem apenas segmentados maduros","Na infecção bacteriana aguda: desvio à esquerda ESCALONADO (bastões e metamielócitos aumentados, formas mais imaturas raras) com leucocitose e granulações tóxicas; na leucemia mieloide: HIATO LEUCÊMICO (presença de blastos + segmentados com ausência das formas intermediárias) e/ou blastos >20%","Na leucemia aparecem apenas eosinófilos imaturos","Não há diferença — ambas são idênticas no hemograma","Infecção bacteriana causa trombocitose e leucemia causa trombocitopenia sempre"],cor:1,let:"B",exp:"Infecção bacteriana: desvio à esquerda REACIONAL = escalonado (mais bastões → menos metamielócitos → raro mielócitos) + granulações tóxicas + vacuolização + corpos de Döhle = sinais de ativação. Leucemia mieloide: HIATO LEUCÊMICO = blastos + segmentados SEM formas intermediárias (a produção é descontrolada). Blastos >20% = critério OMS para leucemia aguda. Diferenciação fundamental para não confundir desvio à esquerda infeccioso com leucemia.",dif:"Difícil",cat:"Hemograma"},

// ===== XI. COLORAÇÃO DE GRAM (2 questões) =====
{n:55,q:"Paciente com pneumonia. Escarro mostra cocos Gram-positivos aos pares (diplococos).<br><br>Qual a correlação entre a cor na coloração de Gram e a estrutura da parede celular?",opts:["Gram-positivos são rosa porque têm membrana externa fina","Gram-POSITIVOS (roxo/violeta) possuem parede de peptidoglicano ESPESSA que retém o cristal violeta; Gram-NEGATIVOS (rosa/vermelho) possuem peptidoglicano fino + membrana externa com LPS. Diplococos Gram-positivos no escarro = provável <i>Streptococcus pneumoniae</i>","Gram-negativos são roxos porque o LPS retém a safranina","A cor não tem relação com a parede — é aleatória","Gram-positivos e negativos têm a mesma parede mas coram diferente por pH"],cor:1,let:"B",exp:"Gram: (1) cristal violeta → todas coram roxo; (2) iodo → fixa corante; (3) álcool → descolora Gram-negativos (parede fina perde corante), Gram-positivos retêm (parede espessa); (4) safranina → contracora Gram-negativos de rosa. Gram+: roxo/violeta, parede espessa (Staph, Strep, Bacillus, Clostridium). Gram-: rosa/vermelho, parede fina + membrana externa com LPS (Neisseria, Pseudomonas, E. coli). Diplococo Gram+ = pneumococo.",dif:"Médio",cat:"Gram/Micro"},
{n:56,q:"O professor mostra uma lâmina de líquor com diplococos Gram-negativos intracelulares (dentro de neutrófilos).<br><br>Qual o patógeno mais provável e qual componente de sua parede é reconhecido por TLR4?",opts:["<i>Staphylococcus aureus</i> — peptidoglicano via TLR2","<i>Neisseria meningitidis</i> — LPS (lipopolissacarídeo) da membrana externa reconhecido por TLR4 → NF-κB → citocinas pró-inflamatórias → inflamação meníngea intensa","<i>Mycobacterium tuberculosis</i> — ácido micólico via TLR1","<i>Candida albicans</i> — β-glucano via Dectina-1","<i>Streptococcus pyogenes</i> — proteína M via TLR5"],cor:1,let:"B",exp:"Diplococos Gram-negativos no líquor = Neisseria meningitidis (meningococo). Gram-negativo → membrana externa com LPS. LPS = PAMP reconhecido por TLR4. LPS→TLR4→MyD88→NF-κB→TNF-α, IL-1, IL-6 → inflamação meníngea severa. Staphylococcus = Gram-POSITIVO (TLR2 reconhece peptidoglicano). Correlação TLR-PAMP: TLR2=Gram+, TLR4=Gram-(LPS), TLR5=flagelina, TLR9=DNA CpG, TLR7/8=RNA viral.",dif:"Médio",cat:"Gram/Micro"},

// ===== XII. APOPTOSE E MECANISMOS CITOTÓXICOS (3 questões) =====
{n:57,q:"Linfócito T CD8+ reconhece uma célula infectada por vírus via MHC-I. Ele destrói a célula infectada por apoptose.<br><br>Qual é a via MAIS EFICIENTE de killing usada pelo CD8+ e qual o ponto de não-retorno?",opts:["Via extrínseca (Fas/FasL) é mais eficiente; o ponto de não-retorno é Fas","Via INTRÍNSECA (Perforina/Granzima): perforina cria poro na membrana → Granzima B entra → ativa CASPASE 3 (ponto de não-retorno) → cascata de apoptose irreversível → fragmentação de DNA, blebbing de membrana. É MAIS EFICIENTE que a via extrínseca (Fas/FasL)","Via do complemento MAC é a mais eficiente; ponto de não-retorno é C9","Via de necrose por TNF-α; ponto de não-retorno é TNF-R1","Via de autofagia; ponto de não-retorno é a formação do autofagossomo"],cor:1,let:"B",exp:"CD8+ e NK usam 2 vias: (1) INTRÍNSECA (perforina/granzima) = mais eficiente: perforina = poro → granzima B entra → ativa caspase 3 = PONTO DE NÃO-RETORNO → apoptose inevitável. (2) EXTRÍNSECA (Fas/FasL): CD8+ expressa FasL → liga Fas na célula-alvo → DISC → caspase 8 → caspase 3 → apoptose. Via intrínseca é direta e mais rápida. O professor enfatizou que 'CD8+ induz APOPTOSE, não lise — o nome citotóxico é enganoso'.",dif:"Médio",cat:"Apoptose/Citotox"},
{n:58,q:"Células tumorais frequentemente superexpressam Bcl-2 (proteína anti-apoptótica). Isso é uma vantagem evolutiva para o tumor.<br><br>Por que a superexpressão de Bcl-2 permite que células tumorais escapem da vigilância imunológica?",opts:["Bcl-2 impede a entrada de anticorpos na célula tumoral","Bcl-2 bloqueia a via mitocondrial de apoptose: impede Bax/Bak de permeabilizar a membrana mitocondrial → sem liberação de citocromo c → sem formação de apoptossomo → caspase 9 não ativa → caspase 3 não ativa → célula tumoral resiste à apoptose induzida por CD8+/NK","Bcl-2 ativa o complemento a favor do tumor","Bcl-2 produz IgG protetora ao redor da célula tumoral","Bcl-2 transforma células tumorais em APCs que desativam CD8+"],cor:1,let:"B",exp:"Bcl-2 = anti-apoptótica (inibe Bax/Bak). Via mitocondrial: estresse/sinal de morte → Bax/Bak permeabilizam membrana mitocondrial externa → citocromo c sai → apoptossomo → caspase 9 (iniciadora) → caspase 3 (executora = ponto de não-retorno). Bcl-2 bloqueia ANTES do citocromo c → resistência à apoptose. Tumores com Bcl-2 alto: resistem a CD8+, NK e quimioterapia. Alvo terapêutico: venetoclax (inibidor de Bcl-2) em leucemias.",dif:"Difícil",cat:"Apoptose/Citotox"},
{n:59,q:"O professor compara NK e CD8+: 'Ambas matam do mesmo jeito, mas reconhecem de forma oposta.'<br><br>Qual a diferença fundamental no reconhecimento entre NK e CD8+?",opts:["NK reconhece MHC-II e CD8+ reconhece MHC-I","CD8+ reconhece peptídeo + MHC-I PRESENTE na célula-alvo (precisa de MHC-I); NK reconhece a AUSÊNCIA de MHC-I ('missing self' — receptores inibitórios KIR não são ativados → NK desinibe e mata). Ambas usam perforina/granzima e Fas/FasL para induzir apoptose","NK usa anticorpos e CD8+ usa complemento","NK mata apenas bactérias e CD8+ mata apenas vírus","CD8+ é da imunidade inata e NK é da adaptativa"],cor:1,let:"B",exp:"CD8+ = adaptativo, específico, memória. Reconhece peptídeo+MHC-I → mata se detecta antígeno estranho no MHC-I. NK = inato, não-específico, SEM memória (sempre naïve). Reconhece AUSÊNCIA de MHC-I (missing self) → mata quando célula perde MHC-I (tumores, vírus que downregulam MHC-I para escapar de CD8+). Por isso são COMPLEMENTARES: vírus esconde MHC-I → escapa de CD8+ → mas ativa NK. NK: CD16+ CD56+, SEM CD3.",dif:"Médio",cat:"Apoptose/Citotox"},

// ===== XIII. MIMETISMO MOLECULAR E AUTOIMUNIDADE (2 questões) =====

// ===== ENGINE =====
let Q=[...ALL],cur=0,ans={},rev={};
const $=s=>document.getElementById(s);

// Dark mode persistence (default: dark)
if(localStorage.getItem('dk')==='false') document.body.classList.remove('dark');

// Populate category filter
const cats=[...new Set(ALL.map(q=>q.cat))].sort();
cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;$('catFilter').appendChild(o)});

function applyFilter(){
  const c=$('catFilter').value,d=$('diffFilter').value;
  Q=ALL.filter(q=>(c==='all'||q.cat===c)&&(d==='all'||q.dif===d));
  if(!Q.length){Q=[...ALL];$('catFilter').value='all';$('diffFilter').value='all'}
  cur=0;ans={};rev={};render();
}
function shuffle(){Q.sort(()=>Math.random()-.5);cur=0;ans={};rev={};render()}
function resetAll(){ans={};rev={};cur=0;render()}
function toggleHeader(){const h=$('hdr');h.classList.toggle('collapsed');$('menuBtn').textContent=h.classList.contains('collapsed')?'☰ Menu':'✕ Fechar'}

function render(){
  const q=Q[cur];
  if(!q)return;
  // Stats
  const done=Object.keys(rev).length,right=Object.keys(rev).filter(k=>ans[k]===Q[k].cor).length,wrong=done-right;
  $('stats').innerHTML=`<span>${done}/${Q.length} respondidas</span><span>${right} certas</span><span>${done?Math.round(right/done*100):0}%</span>`;
  $('st-done').textContent=done+'/'+Q.length;
  $('st-right').textContent=right;
  $('st-wrong').textContent=wrong;
  $('st-pct').textContent=(done?Math.round(right/done*100):0)+'%';
  // Card
  let h=`<div class="qinfo"><span class="qnum">Questão ${cur+1} de ${Q.length}</span><div class="tags"><span class="diff">${q.dif}</span><span class="cat">${q.cat}</span></div></div>`;
  h+=`<div class="qtxt">${q.q}</div>`;
  q.opts.forEach((o,i)=>{
    let cls='opt';
    if(rev[cur]){if(i===q.cor)cls+=' correct';else if(ans[cur]===i)cls+=' wrong'}
    else if(ans[cur]===i)cls+=' sel';
    h+=`<button class="${cls}" onclick="pick(${i})">${String.fromCharCode(65+i)}) ${o}</button>`;
  });
  h+=`<div class="btns"><button onclick="reveal()">Revelar</button></div>`;
  h+=`<div class="expl ${rev[cur]?'show':''}" id="expl"><strong>Gabarito: ${q.let}</strong>${q.exp}</div>`;
  $('qcard').innerHTML=h;
  // Grid
  let g='';
  Q.forEach((_,i)=>{
    let c='';if(i===cur)c+=' cur';if(ans[i]!==undefined)c+=' done';
    if(rev[i]&&ans[i]===Q[i].cor)c+=' right';else if(rev[i]&&ans[i]!==undefined)c+=' wrong';
    g+=`<button class="${c}" onclick="cur=${i};render()">${i+1}</button>`;
  });
  $('grid').innerHTML=g;
  $('pf').style.width=(done/Q.length*100)+'%';
  // Show score if all done
  if(done===Q.length){
    $('score').style.display='block';
    $('score').innerHTML=`<h2>Simulado Finalizado</h2><div class="perc">${Math.round(right/done*100)}%</div><div class="detail">${right}/${done} questões corretas<br>Revise as questões marcadas em vermelho</div>`;
  } else $('score').style.display='none';
}
function pick(i){if(!rev[cur]){ans[cur]=i;render()}}
function reveal(){if(ans[cur]!==undefined){rev[cur]=true;render()}}
function go(d){cur=Math.max(0,Math.min(Q.length-1,cur+d));render()}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')go(1);if(e.key==='ArrowLeft')go(-1);if(e.key===' '){e.preventDefault();reveal()}
});
render();
</script>
