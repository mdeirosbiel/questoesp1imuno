<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado Final — Imunologia P1</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#fff;color:#222}
body.dark{background:#141414;color:#d4d4d4}

/* Toggle bar */
.topbar{position:sticky;top:0;z-index:1001;background:#222;display:flex;justify-content:flex-end;padding:4px 12px}
body.dark .topbar{background:#0a0a0a}
.topbar button{background:none;border:none;color:#888;cursor:pointer;font:12px 'Inter',sans-serif;padding:4px 8px}
.topbar button:hover{color:#fff}

/* Header */
header{background:#222;color:#fff;padding:14px 20px;position:sticky;top:60px;z-index:998;border-bottom:1px solid #333;transition:all .3s}
body.dark header{background:#111}
header.collapsed{max-height:0;padding:0 20px;overflow:hidden;border:none}
header h1{font-size:14px;font-weight:600;margin-bottom:10px}
.filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filters select,.filters button{font:12px 'Inter',sans-serif;padding:4px 10px;border:1px solid #555;background:transparent;color:#ccc;border-radius:3px;cursor:pointer}
.filters select option{background:#222;color:#ccc}
.filters button:hover{border-color:#999;color:#fff}
.filters .active{background:#fff;color:#222;border-color:#fff}
body.dark .filters .active{background:#ccc;color:#111}
.stats{font-size:11px;color:#999;margin-top:8px;display:flex;gap:16px}
.statsbar{background:#1a1a1a;border-bottom:1px solid #252525;padding:6px 20px;display:flex;gap:16px;align-items:center;font-size:12px;color:#aaa;position:sticky;top:28px;z-index:999}
body:not(.dark) .statsbar{background:#f5f5f5;border-bottom-color:#e0e0e0;color:#666}
.statsbar .stat-item{display:flex;align-items:center;gap:4px}
.statsbar .stat-val{font-weight:600;color:#ddd}
body:not(.dark) .statsbar .stat-val{color:#222}
.statsbar .stat-right{color:#5b5}
.statsbar .stat-wrong{color:#b55}
.statsbar .stat-pct{font-weight:700;font-size:14px;margin-left:auto;color:#fff}
body:not(.dark) .statsbar .stat-pct{color:#222}

/* Main */
.wrap{max-width:780px;margin:20px auto;padding:0 16px}
.prog{height:3px;background:#e0e0e0;margin-bottom:16px}
body.dark .prog{background:#333}
.prog-fill{height:3px;background:#444;width:0%;transition:width .3s}
body.dark .prog-fill{background:#888}

/* Grid */
.grid{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:16px}
.grid button{width:30px;height:26px;font-size:10px;border:1px solid #ddd;background:#fff;color:#222;border-radius:3px;cursor:pointer;padding:0;transition:all .15s}
body.dark .grid button{background:#1e1e1e;border-color:#333;color:#aaa}
.grid button.cur{border-color:#222;font-weight:700;background:#f0f0f0}
body.dark .grid button.cur{border-color:#aaa;background:#2a2a2a}
.grid button.done{background:#e8e8e8}
body.dark .grid button.done{background:#252525}
.grid button.right{border-left:2px solid #4a4}
.grid button.wrong{border-left:2px solid #a44}

/* Card */
.qcard{border:1px solid #e0e0e0;padding:24px;margin-bottom:16px}
body.dark .qcard{border-color:#2a2a2a}
.qinfo{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.qnum{font-weight:600;font-size:13px}
.tags{display:flex;gap:4px}
.diff{font-size:10px;padding:2px 7px;border:1px solid #999;border-radius:3px}
.cat{font-size:10px;padding:2px 7px;border:1px solid #6a8;color:#6a8;border-radius:3px}
body.dark .cat{border-color:#5a7;color:#5a7}
.qtxt{font-size:14.5px;line-height:1.75;margin-bottom:18px}
.lab{background:#f8f8f0;border:1px solid #e0dcc8;border-radius:4px;padding:10px 14px;margin:10px 0 16px;font-size:12.5px;line-height:1.8}
body.dark .lab{background:#1a1a14;border-color:#333020}

/* Options */
.opt{display:block;width:100%;text-align:left;padding:11px 14px;margin-bottom:6px;border:1px solid #ddd;background:#fff;font-size:13.5px;line-height:1.5;cursor:pointer;border-radius:4px;font-family:inherit;transition:all .15s}
body.dark .opt{background:#1a1a1a;border-color:#2a2a2a;color:#d4d4d4}
.opt:hover{background:#f5f5f5}
body.dark .opt:hover{background:#222}
.opt.sel{border-color:#444;background:#f0f0f0}
body.dark .opt.sel{border-color:#666;background:#252525}
.opt.correct{border-color:#4a4;background:#efffef}
body.dark .opt.correct{border-color:#4a4;background:#1a2e1a}
.opt.wrong{border-color:#a44;background:#fff0f0}
body.dark .opt.wrong{border-color:#a44;background:#2e1a1a}

/* Buttons */
.btns{display:flex;gap:8px;margin-top:14px}
.btns button{padding:7px 14px;border:1px solid #444;background:#222;color:#fff;border-radius:4px;cursor:pointer;font:13px 'Inter',sans-serif}
body.dark .btns button{background:#2a2a2a;border-color:#444}
.btns button:hover{background:#333}

/* Explanation */
.expl{margin-top:14px;padding:14px;background:#fafafa;border-left:3px solid #222;display:none;font-size:13px;line-height:1.7}
body.dark .expl{background:#1a1a1a;border-left-color:#666}
.expl.show{display:block}
.expl strong{display:block;margin-bottom:6px}

/* Nav */
.nav{display:flex;justify-content:space-between;margin-top:14px}
.nav button{padding:7px 18px;border:1px solid #ddd;background:#fff;cursor:pointer;border-radius:4px;font:13px 'Inter',sans-serif}
body.dark .nav button{background:#1e1e1e;border-color:#333;color:#ccc}

/* Score */
.score{text-align:center;padding:40px;display:none}
.score h2{margin-bottom:12px;font-size:20px}
.score .perc{font-size:48px;font-weight:700;margin:16px 0}
.score .detail{font-size:14px;color:#666;line-height:1.8}
body.dark .score .detail{color:#999}

/* Responsive */
@media(max-width:600px){
  .wrap{padding:0 10px}
  .qcard{padding:16px}
  .filters{gap:4px}
  header h1{font-size:13px}
}
</style>
</head>
<body class="dark">
<div class="topbar">
  <button id="menuBtn" onclick="toggleHeader()">☰ Menu</button>
  <button onclick="document.body.classList.toggle('dark');localStorage.setItem('dk',document.body.classList.contains('dark'))">◑</button>
</div>
<div class="statsbar" id="statsbar">
  <span class="stat-item">Respondidas: <span class="stat-val" id="st-done">0/61</span></span>
  <span class="stat-item">Certas: <span class="stat-val stat-right" id="st-right">0</span></span>
  <span class="stat-item">Erradas: <span class="stat-val stat-wrong" id="st-wrong">0</span></span>
  <span class="stat-pct" id="st-pct">0%</span>
</div>
<header id="hdr" class="collapsed">
  <h1>Simulado Final — Imunologia P1 | 3º Semestre</h1>
  <div class="filters">
    <select id="catFilter" onchange="applyFilter()">
      <option value="all">Todos os temas</option>
    </select>
    <select id="diffFilter" onchange="applyFilter()">
      <option value="all">Todas dificuldades</option>
      <option value="Médio">Médio</option>
      <option value="Difícil">Difícil</option>
    </select>
    <button onclick="shuffle()">Embaralhar</button>
    <button onclick="resetAll()">Recomeçar</button>
  </div>
  <div class="stats" id="stats"></div>
</header>
<div class="wrap">
  <div class="prog"><div class="prog-fill" id="pf"></div></div>
  <div class="grid" id="grid"></div>
  <div class="qcard" id="qcard"></div>
  <div class="nav">
    <button onclick="go(-1)">← Anterior</button>
    <button onclick="go(1)">Próxima →</button>
  </div>
  <div class="score" id="score"></div>
</div>
<script>
const ALL=[
{"n":1,"q":"Paciente de 25 anos com meningite bacteriana recorrente por <i>Neisseria meningitidis</i>. Investigação laboratorial revela deficiência de C5-C9 (complemento terminal). O infectologista explica que o sistema complemento possui três vias de ativação.<br><br>Qual via é ativada diretamente por anticorpos IgG ou IgM ligados ao patógeno, e qual é o primeiro componente envolvido?","opts":["Via clássica — C3b opsoniza diretamente sem necessidade de anticorpo","Via alternativa — Fator B se liga a PAMPs bacterianos","Via das lectinas — MBL reconhece manose na superfície bacteriana","Via alternativa — C3 sofre hidrólise espontânea (tick-over) na superfície do patógeno","Via clássica — C1q se liga ao domínio Fc de IgG/IgM no complexo antígeno-anticorpo, iniciando a cascata C1→C4→C2→C3"],"cor":4,"let":"E","dif":"Médio","cat":"Complemento","exp":"Via CLÁSSICA: anticorpo (IgG/IgM) liga-se ao antígeno → C1q reconhece domínio Fc do anticorpo → ativa C1r/C1s → cliva C4 e C2 → forma C3 convertase (C4b2a). Via ALTERNATIVA: não precisa de anticorpo, C3 sofre hidrólise espontânea (tick-over). Via das LECTINAS: MBL reconhece manose. A deficiência de C5-C9 (MAC) explica a susceptibilidade a Neisseria, pois este gênero é particularmente dependente de lise por MAC para sua eliminação."},
{"n":2,"q":"Recém-nascido com infecções bacterianas graves desde as primeiras semanas de vida. A dosagem de C3 sérico é indetectável.<br><br><div class='lab'>• C3: indetectável<br>• C4: normal<br>• CH50: muito reduzido<br>• Imunoglobulinas: normais</div>Por que a deficiência de C3 é tão devastadora comparada à deficiência de outros componentes?","opts":["C3 é o ponto de convergência das três vias do complemento — sem C3, nenhuma via completa a cascata: não há opsonização (C3b), não há anafilaxia (C3a), e não se forma o MAC (C5b-9)","A deficiência de C3 não é grave se as imunoglobulinas estiverem normais","C3 é necessário apenas para lise viral, e bactérias são eliminadas por outras vias","C3 é exclusivo da via clássica e sem ele não há ativação por anticorpos","C3 é produzido exclusivamente pelo timo e sua ausência indica aplasia tímica"],"cor":0,"let":"A","dif":"Difícil","cat":"Complemento","exp":"C3 é a ENCRUZILHADA do sistema complemento — todas as três vias (clássica, alternativa, lectinas) convergem na clivagem de C3. Sem C3: (1) sem C3b = sem opsonização, (2) sem C3a = sem recrutamento inflamatório, (3) sem C5 convertase = sem MAC = sem lise. Por isso CH50 está muito reduzido. C4 normal indica que o início da via clássica funciona, mas para em C3."},
{"n":3,"q":"Paciente de 22 anos desenvolve edema facial súbito e dor abdominal recorrente. Diagnóstico: angioedema hereditário por deficiência de inibidor de C1 (C1-INH).<br><br>Qual é a consequência bioquímica direta da ausência de C1-INH?","opts":["Ativação constitutiva de NK por fragmentos do complemento","Ativação descontrolada de C1r/C1s → clivagem excessiva de C4/C2 → produção de bradicinina e C2-cinina → vasodilatação e aumento de permeabilidade vascular → edema","Formação descontrolada de MAC nos vasos sanguíneos causando hemólise","Produção excessiva de C5a causando anafilaxia sistêmica permanente","Opsonização descontrolada de hemácias próprias por C3b"],"cor":1,"let":"B","dif":"Difícil","cat":"Complemento","exp":"C1-INH regula C1r/C1s e o sistema calicreína-cinina. Sem C1-INH: C1 permanece ativo → cliva C4/C2 sem controle → C2-cinina + bradicinina (via calicreína) → vasodilatação + permeabilidade = EDEMA. NÃO mediado por histamina (anti-histamínicos não funcionam). Tratamento: reposição de C1-INH ou icatibanto (inibidor de bradicinina)."},
{"n":4,"q":"Paciente com hemoglobinúria paroxística noturna (HPN) apresenta hemólise intravascular crônica. Investigação revela ausência de CD55 (DAF) e CD59 (MIRL) nas hemácias.<br><br>Qual é a função dessas moléculas e por que sua ausência causa hemólise?","opts":["CD55 e CD59 impedem a fagocitose esplênica por bloqueio de receptores Fc","CD55 e CD59 são receptores de IgG que impedem a opsonização de hemácias","CD55 acelera a degradação de C3/C5 convertases e CD59 bloqueia a inserção do MAC (C5b-9) na membrana; sem eles, o complemento ativado espontaneamente (via alternativa) destrói as próprias hemácias por lise","CD55 produz anticorpos protetores e CD59 ativa linfócitos T reguladores","CD55 e CD59 são moléculas de adesão que mantêm hemácias aderidas ao endotélio"],"cor":2,"let":"C","dif":"Difícil","cat":"Complemento","exp":"HPN = deficiência de âncora GPI → sem CD55 (DAF = degrada C3/C5 convertases) nem CD59 (inibe inserção de C9 no MAC). Via alternativa tem ativação basal (tick-over de C3), mas CD55/CD59 protegem células próprias. Sem eles: complemento destrói hemácias próprias → hemólise intravascular → hemoglobinúria."},
{"n":5,"q":"Sobre as anafilotoxinas C3a, C4a e C5a: qual NÃO é uma ação desses fragmentos?","opts":["Desgranulação de mastócitos com liberação de histamina","Aumento da permeabilidade vascular","Contração de musculatura lisa brônquica","Opsonização direta de patógenos para fagocitose","Quimiotaxia de neutrófilos (especialmente C5a)"],"cor":3,"let":"D","dif":"Médio","cat":"Complemento","exp":"Anafilotoxinas (C3a, C4a, C5a) causam: contração de músculo liso, aumento de permeabilidade vascular, desgranulação de mastócitos, quimiotaxia (C5a mais potente). OPSONIZAÇÃO é função de C3b e C4b (fragmentos grandes na superfície do patógeno), NÃO das anafilotoxinas (fragmentos pequenos e solúveis)."},
{"n":6,"q":"Paciente com lúpus eritematoso sistêmico (LES) apresenta deficiência genética de C2. Por que deficiências de C1q, C2, C4 estão fortemente associadas ao LES?","opts":["A deficiência de C2 causa neutropenia que leva à infecção crônica e autoimunidade secundária","C2 inibe diretamente a produção de autoanticorpos pelos linfócitos B","Sem via clássica, não há produção de anticorpos contra DNA","A via clássica é essencial para a depuração (clearance) de imunocomplexos e células apoptóticas; sem ela, imunocomplexos se acumulam nos tecidos e restos celulares expõem autoantígenos, gerando autoimunidade","C2 é necessário para seleção negativa no timo"],"cor":3,"let":"D","dif":"Difícil","cat":"Complemento","exp":"Via clássica = depuração de imunocomplexos (IC) e células apoptóticas. C1q liga a células apoptóticas e IC → C3b opsoniza → fagócitos removem. Sem C1q/C2/C4: IC acumulam em rim, pele, articulações + autoantígenos expostos → anti-dsDNA → LES. Deficiência de C1q tem ~93% risco de LES."},
{"n":7,"q":"Paciente de 10 anos com DM1. Tipagem HLA: DR3/DR4. Anti-GAD65 e anti-IA2 positivos. Peptídeo C indetectável.<br><br><div class='lab'>• Glicemia: 320 mg/dL<br>• HbA1c: 11,2%<br>• Anti-GAD65: positivo<br>• Anti-IA2: positivo<br>• Peptídeo C: indetectável</div>Qual a relação entre HLA-DR3/DR4 e a destruição das células beta?","opts":["HLA-DR3/DR4 (MHC classe II) apresenta autoantígenos de células beta (GAD65, proinsulina) a linfócitos T CD4+ autorreativos que escaparam da seleção negativa → CD4+ ativam CTLs CD8+ → destruição das ilhotas por perforina/granzima","HLA-DR3/DR4 são anticorpos que atacam diretamente as ilhotas","HLA-DR3/DR4 bloqueia a produção de insulina por mecanismo não-imunológico","Os anticorpos anti-GAD são a causa primária da destruição, sem participação de células T","HLA-DR3/DR4 impede a maturação de linfócitos no timo"],"cor":0,"let":"A","dif":"Difícil","cat":"HLA/MHC","exp":"DM1 = autoimunidade mediada por células T, NÃO por anticorpos. HLA-DR3/DR4 = MHC classe II → apresenta peptídeos a CD4+. O bolso do DR3/DR4 acomoda eficientemente peptídeos de GAD65 e proinsulina → T CD4+ autorreativos → help para CD8+ → destruição de células beta. Anti-GAD são MARCADORES, não causa."},
{"n":8,"q":"Homem de 30 anos com espondilite anquilosante. HLA-B27 positivo. Anti-TNF-α melhora lombalgia.<br><br>Qual a classe do HLA-B27, a que linfócito apresenta, e por que anti-TNF-α funciona?","opts":["HLA-B27 é uma imunoglobulina; anti-TNF-α neutraliza o anticorpo","HLA-B27 é classe I (loci A, B, C), apresenta peptídeos a CD8+; o TNF-α produzido por macrófagos amplifica inflamação articular, bloqueá-lo reduz dano tecidual","HLA-B27 é receptor de complemento; anti-TNF-α inibe cascata","HLA-B27 é classe I mas apresenta a CD4+; anti-TNF-α é anti-histamínico","HLA-B27 é classe II, apresenta a CD4+; anti-TNF-α bloqueia TFH"],"cor":1,"let":"B","dif":"Médio","cat":"HLA/MHC","exp":"HLA-A, B, C = CLASSE I → TODAS as células nucleadas → apresentam a CD8+. HLA-DR, DQ, DP = CLASSE II → apenas APCs → apresentam a CD4+. B27 = CLASSE I. TNF-α = citocina pró-inflamatória de macrófagos → amplifica destruição articular. Anti-TNF-α bloqueia a citocina efetora."},
{"n":9,"q":"Mulher de 35 anos com doença celíaca. HLA-DQ2 positivo. Dieta sem glúten resolve sintomas.<br><br>Qual o papel do HLA-DQ2 na patogênese?","opts":["HLA-DQ2 é MHC classe I e apresenta a CD8+ diretamente","HLA-DQ2 ativa complemento contra enterócitos","HLA-DQ2 (MHC classe II) apresenta peptídeos de gliadina deamidados pela transglutaminase tecidual a linfócitos T CD4+ → resposta TH1 com IFN-γ → ativação de CD8+ intraepiteliais → destruição de enterócitos → atrofia vilositária","HLA-DQ2 é anticorpo que degrada glúten","HLA-DQ2 bloqueia absorção de glúten por mecanismo físico"],"cor":2,"let":"C","dif":"Difícil","cat":"HLA/MHC","exp":"HLA-DQ2/DQ8 = classe II. Transglutaminase deamida gliadina → peptídeos encaixam no bolso do DQ2 → apresentação a CD4+ → TH1/IFN-γ → CD8+ intraepiteliais → lise de enterócitos. Dieta sem glúten remove o antígeno → sem inflamação."},
{"n":10,"q":"Sobre genética do HLA classe I, assinale a correta:","opts":["HLA classe I é codificado no cromossomo X com herança ligada ao sexo","HLA classe I possui 2 loci com dominância simples","HLA classe I possui 1 locus com herança recessiva","HLA classe I possui 5 loci e só se expressa em células imunes","HLA classe I possui 3 loci (A, B, C), é codificado no cromossomo 6 e tem expressão CODOMINANTE — ambos os alelos (materno e paterno) são expressos simultaneamente"],"cor":4,"let":"E","dif":"Médio","cat":"HLA/MHC","exp":"HLA classe I: 3 loci = A, B, C. Cromossomo 6. CODOMINANTE = ambos alelos expressos → até 6 moléculas HLA-I diferentes por pessoa. MHC é o sistema mais polimórfico do genoma humano."},
{"n":11,"q":"Transplante renal. 6 meses depois, creatinina sobe. Biópsia: CD8+ intersticial, necrose tubular. C4d negativo, anti-HLA negativos.<br><br><div class='lab'>• Creatinina: 3,8 mg/dL (basal: 1,2)<br>• Biópsia: CD8+ intersticial<br>• C4d: negativo<br>• Anti-HLA doador: negativos</div>Qual o tipo de rejeição?","opts":["Rejeição aguda CELULAR: CD8+ do receptor reconhecem HLA-I do doador como non-self (alorreconhecimento direto) → destruição por perforina/granzima","Rejeição hiperaguda por anticorpos pré-formados anti-ABO","Nefrotoxicidade por imunossupressores sem componente imune","GVHD — linfócitos do doador atacam receptor","Rejeição crônica humoral com C4d positivo"],"cor":0,"let":"A","dif":"Difícil","cat":"HLA/MHC","exp":"C4d negativo + anti-HLA negativos = descarta humoral. CD8+ intersticial = REJEIÇÃO AGUDA CELULAR. CD8+ reconhece HLA-I do doador → alorreconhecimento direto → perforina/granzima → necrose tubular. GVHD = transplante de medula, não órgão sólido."},
{"n":12,"q":"Vírus infecta célula epitelial. Proteína viral sintetizada no citoplasma.<br><br>Qual a via de processamento e apresentação deste antígeno endógeno?","opts":["Proteína viral secretada → reconhecida por IgM sem processamento","Proteína viral citoplásmica → degradada pelo PROTEASSOMA → peptídeo transportado ao RE pelo TAP → liga-se a MHC-I → apresentação a CD8+","Proteína viral ativa TLR4 → apresentação sem MHC","Proteína viral apresentada por MHC-II a CD8+","Proteína viral fagocitada → degradada em endossomo → MHC-II → CD4+"],"cor":1,"let":"B","dif":"Médio","cat":"HLA/MHC","exp":"ENDÓGENOS (vírus, tumores) → via citosólica: proteassoma → TAP → RE → MHC-I → CD8+. EXÓGENOS (fagocitados) → via endossomal → MHC-II → CD4+."},
{"n":13,"q":"Paciente alérgico a penicilina. Professor explica que penicilina sozinha é pequena demais para ser imunogênica.<br><br>Qual o conceito imunológico?","opts":["Mimetismo molecular — penicilina imita proteínas humanas","Tolerância oral — penicilina é reconhecida como self","Hapteno — molécula pequena que sozinha não é imunogênica, mas ao conjugar com proteínas séricas (carreador) forma complexo hapteno-carreador capaz de gerar resposta imune adaptativa","Superantígeno — ativa 20% dos T simultaneamente","Adjuvante — potencializa resposta a outros antígenos"],"cor":2,"let":"C","dif":"Médio","cat":"HLA/MHC","exp":"HAPTENO = molécula pequena, NÃO imunogênica sozinha, imunogênica ao ligar a carreador proteico. Penicilina + albumina sérica → complexo → B internaliza → apresenta peptídeo do carreador via MHC-II a TFH → anticorpos contra a penicilina."},
{"n":14,"q":"Criança com síndrome de DiGeorge (aplasia tímica) apresenta infecções virais e fúngicas graves desde o nascimento.<br><br>Por que a ausência do timo é devastadora contra vírus e fungos intracelulares?","opts":["O timo produz complemento essencial contra vírus","Sem timo, os B não funcionam e não há IgE antiviral","O timo produz anticorpos IgG contra vírus","Sem timo, não há maturação de linfócitos T → sem CD4+ (comando) e sem CD8+ (citotoxicidade) → resposta celular inexistente; vírus e fungos intracelulares dependem de TH1/CD8+ que é impossível sem maturação tímica","O timo é órgão de maturação de neutrófilos"],"cor":3,"let":"D","dif":"Difícil","cat":"Órgãos Linfoides","exp":"Timo = órgão linfoide PRIMÁRIO de maturação de T. Sem timo: sem CD4+/CD8+ maduros. Vírus/fungos intracelulares requerem TH1 (IFN-γ→macrófagos) e CD8+ (killing). Anticorpos maternos compensam parcialmente contra extracelulares."},
{"n":15,"q":"No timo, apenas ~5% dos timócitos sobrevivem. O que acontece com os 95%?","opts":["95% são reciclados como células-tronco","95% morrem por necrose por falta de espaço","95% são exportados ao baço para completar maturação","95% se diferenciam em NK na medula tímica","95% sofrem APOPTOSE: seleção negativa (autorreativos deletados) e seleção positiva (os que não reconhecem MHC próprio eliminados por negligência), garantindo que apenas T com TCR funcional e não-autorreativo saiam para circulação"],"cor":4,"let":"E","dif":"Médio","cat":"Órgãos Linfoides","exp":"Seleção tímica: POSITIVA (córtex): deve reconhecer MHC próprio. NEGATIVA (medula): reage forte contra self → apoptose. ~5% sobrevivem = TCR funcional + tolerante. Corpúsculos de Hassall = evidência de destruição. Mecanismo de TOLERÂNCIA CENTRAL."},
{"n":16,"q":"Mulher de 28 anos com linfonodomegalia cervical. Biópsia: centros germinativos ativos com proliferação B.<br><br>Qual a diferença fundamental entre linfonodo e baço?","opts":["Linfonodo recebe antígenos dos TECIDOS via linfáticos aferentes; baço filtra antígenos do SANGUE (não possui linfáticos aferentes). Ambos são órgãos linfoides secundários","Baço produz T e linfonodo produz B","Linfonodo é primário e baço é secundário","Baço é primário para maturação de B","Linfonodo tem apenas T e baço apenas B"],"cor":0,"let":"A","dif":"Médio","cat":"Órgãos Linfoides","exp":"SECUNDÁRIOS = ativação. Linfonodo: aferentes linfáticos → antígenos de TECIDOS. Baço: filtra SANGUE → polpa branca (imune) + polpa vermelha (hemocateresis ~120d). Ambos têm centros germinativos."},
{"n":17,"q":"Criança com amigdalites de repetição. Otorrino propõe amigdalectomia. Imunologista questiona.<br><br>Qual o papel imunológico das tonsilas?","opts":["Tonsilas são órgãos primários de maturação de T","Tonsilas são MALT (NALTE), compõem o Anel de Waldeyer e são reservatórios de linfócitos B produtores de IgA secretora que protege mucosas das vias aéreas superiores","Tonsilas produzem exclusivamente CD8+ contra vírus respiratórios","Tonsilas não têm função imune e podem ser removidas livremente","Tonsilas produzem complemento local"],"cor":1,"let":"B","dif":"Médio","cat":"Órgãos Linfoides","exp":"Anel de Waldeyer: faríngea (adenoide), palatinas (amígdalas), linguais. MALT/NALTE → B produtores de IgA secretora = proteção silenciosa de mucosas. Remoção compromete defesa mucosa."},
{"n":18,"q":"Paciente esplenectomizado desenvolve sepse fulminante por <i>S. pneumoniae</i>.<br><br>Por que sem baço há vulnerabilidade a encapsulados?","opts":["O baço é o único órgão que produz neutrófilos","O baço é para maturação de CD4+","Baço contém zona marginal com B especializados em antígenos polissacarídicos T-independentes (cápsulas) e macrófagos que filtram bactérias opsonizadas do sangue; sem baço, bacteremias por encapsulados não são controladas","Sem baço não há IgE antibacteriana","O baço produz todo o complemento"],"cor":2,"let":"C","dif":"Difícil","cat":"Órgãos Linfoides","exp":"Baço: zona marginal = B que respondem a polissacarídeos (T-independente) → IgM rápida. Polpa vermelha = macrófagos filtram sangue. Sem baço: sem filtro + sem B anticápsulares. Encapsulados (pneumococo, H. influenzae, meningococo) → sepse. Vacinação obrigatória pós-esplenectomia."},
{"n":19,"q":"Paciente HIV+ com CD4 de 85/mm³ e pneumocistose.<br><br><div class='lab'>• CD4+: 85/mm³<br>• Carga viral: 250.000 cópias/mL<br>• LDH: elevado<br>• BAL: cistos de Pneumocystis</div>Por que a destruição de CD4+ é catastrófica?","opts":["HIV destrói apenas NK, únicas defesas contra fungos","CD4+ é o principal fagócito","CD4+ produz todos os anticorpos sozinho","CD4+ é o COMANDANTE CENTRAL: coordena CD8+ (citotoxicidade), macrófagos (via IFN-γ/TH1), B (anticorpos). Sem CD4+, nenhuma resposta adaptativa eficaz — Pneumocystis prolifera porque o eixo TH1/IFN-γ/macrófago alveolar colapsa","HIV causa neutropenia severa"],"cor":3,"let":"D","dif":"Difícil","cat":"Células Imunes","exp":"CD4+ = maestro. HIV infecta via GP120→CD4+CCR5/CXCR4. Com CD4<200: AIDS. Pneumocystis controlado por TH1→IFN-γ→macrófago alveolar. Sem CD4: sem help para CD8, sem TH1, sem anticorpos de qualidade."},
{"n":20,"q":"Células tumorais perdem expressão de HLA-I. Qual célula as elimina e como?","opts":["Neutrófilo fagocita por opsonização","B produz anticorpos contra célula sem MHC-I","CD8+ reconhece ausência de MHC-I e ativa apoptose","Dendrítica destrói tumores por fagocitose","NK (Natural Killer): reconhece AUSÊNCIA de MHC-I como 'missing self'. Receptores inibitórios (KIR) desligam → libera perforina/granzima → apoptose tumoral"],"cor":4,"let":"E","dif":"Médio","cat":"Células Imunes","exp":"NK = inato. CD16+ CD56+. Receptores inibitórios (KIR) reconhecem MHC-I = sinal de segurança. Sem MHC-I = KIR desliga → NK mata. CD8+ PRECISA de MHC-I presente. NK mata quando MHC-I AUSENTE. Complementares na vigilância."},
{"n":21,"q":"O professor diz: 'A célula dendrítica é a rainha do sistema imune, 10x mais eficiente que macrófagos na apresentação.'<br><br>Qual sua função única?","opts":["Única célula que expressa HLA-I","Produz complemento nos tecidos","Destrói patógenos exclusivamente por burst oxidativo","APC profissional mais eficiente — PONTE inata↔adaptativa: captura antígenos nos tecidos, migra a linfonodos e apresenta via MHC-I (cross-presentation a CD8+) e MHC-II (a CD4+), essencial para INICIAR resposta adaptativa primária","Única célula que produz anticorpos"],"cor":3,"let":"D","dif":"Médio","cat":"Células Imunes","exp":"Dendrítica = PONTE inata↔adaptativa. Única APC que: (1) inicia resposta primária (ativa T naïve), (2) cross-presentation (exógenos via MHC-I a CD8+). Langerhans = dendríticas da epiderme."},
{"n":22,"q":"Apendicite aguda. Hemograma:<br><br><div class='lab'>• Leucócitos: 18.500/mm³<br>• Segmentados: 75%<br>• Bastões: 12%<br>• Metamielócitos: 2%<br>• Linfócitos: 8%<br>• Eosinófilos: 0%</div>'Desvio à esquerda'. Qual a interpretação?","opts":["Basofilia sugestiva de leucemia mieloide","Aumento de linfócitos por infecção viral","Eosinofilia por parasitose","Queda de plaquetas por consumo inflamatório","Liberação precoce de formas IMATURAS de neutrófilos (bastões >5%, metamielócitos) pela medula em resposta a G-CSF e IL-17 no foco infeccioso bacteriano agudo"],"cor":4,"let":"E","dif":"Médio","cat":"Células Imunes","exp":"Desvio à ESQUERDA = imaturas no sangue (bastões >5%, metamielócitos). Infecção bacteriana aguda: TNF-α + IL-1 + G-CSF + IL-17 → medula libera antes de completar maturação. Série: mieloblasto→promielócito→mielócito→metamielócito→bastão→segmentado."},
{"n":23,"q":"Criança com verminose por <i>Ascaris</i>. Eosinofilia de 18%.<br><br>Qual o papel do eosinófilo contra helmintos?","opts":["Eosinófilos são recrutados por TH2 (IL-5), desgranulam Proteína Básica Principal (MBP) sobre helmintos opsonizados por IgE, causando dano tóxico ao tegumento","Eosinófilos fagocitam helmintos inteiros","Eosinófilos produzem IgE diretamente","Eosinófilos liberam histamina como principal mediador","Eosinófilos ativam via das lectinas contra helmintos"],"cor":0,"let":"A","dif":"Médio","cat":"Células Imunes","exp":"Helmintos→TH2→IL-4 (IgE) + IL-5 (eosinófilos). IgE→helminto→eosinófilo (FcεR)→ADCC→MBP (NÃO histamina). MBP é tóxica para tegumento. Eosinofilia >5% = parasitose ou alergia."},
{"n":24,"q":"Reação anafilática após picada de abelha: urticária, broncoespasmo, hipotensão.<br><br>Qual célula é responsável e qual o mecanismo?","opts":["Basófilo libera complemento no tecido","Mastócito: IgE específica ligada a FcεRI; na reexposição, alérgeno faz cross-linking de IgE → desgranulação → histamina, heparina, enzimas → vasodilatação, broncoconstrição, edema","CD8+ reconhece veneno e destrói mastócitos","Dendrítica secreta TNF-α em massa","Neutrófilo libera enzimas lisossomais"],"cor":1,"let":"B","dif":"Médio","cat":"Células Imunes","exp":"Anafilaxia = hipersensibilidade tipo I. Mastócito = TECIDUAL (não circula, não aparece no hemograma). 1ª exposição→TH2→IL-4→IgE→sensibiliza mastócito. 2ª exposição→cross-linking→desgranulação. Basófilo = equivalente CIRCULANTE."},
{"n":25,"q":"Sobre marcadores CD: 'CD3 é universal e exclusivo de T.' Como diferenciar subtipos?","opts":["CD3+CD4+ = Treg exclusivamente; CD8+ não existe","CD4+ = NK; CD8+ = helper; CD3 = eosinófilo","CD3+CD4+ = T helper (MHC-II); CD3+CD8+ = T citotóxico (MHC-I); CD3 universal em TODO T; CD16+CD56+ = NK (NÃO é T, SEM CD3)","Todos os linfócitos (T, B, NK) expressam CD3","CD4+ = citotóxico; CD8+ = helper; CD3 = marcador de B"],"cor":2,"let":"C","dif":"Médio","cat":"Células Imunes","exp":"CD3 = UNIVERSAL e EXCLUSIVO de T. CD4+ = helper → MHC-II em APCs. CD8+ = citotóxico → MHC-I em qualquer nucleada. NK: CD16+CD56+, SEM CD3."},
{"n":26,"q":"TB pulmonar com granulomas caseosos.<br><br>Qual o mecanismo de formação do granuloma?","opts":["Macrófagos ativados por IFN-γ (TH1/CD4+) tentam conter M. tuberculosis → fundem em células gigantes e epitelioides → CD4+ circundam → granuloma; necrose caseosa = destruição pelo processo crônico","Complemento forma MAC no tecido gerando necrose","B produzem anticorpos que precipitam formando a estrutura","Eosinófilos desgranulam MBP no pulmão","Neutrófilos se acumulam formando abscessos que viram granulomas"],"cor":0,"let":"A","dif":"Difícil","cat":"Células Imunes","exp":"Granuloma = TH1 contra intracelulares persistentes. Macrófago + IFN-γ (CD4/TH1) → epitelioide + célula gigante + CD4+ em torno = contenção. Em HIV (sem CD4): sem granuloma → TB miliar disseminada."},
{"n":27,"q":"Meningite. Líquor com diplococos Gram-negativos.<br><br><div class='lab'>• Líquor turvo<br>• Neutrófilos aumentados<br>• Proteína elevada<br>• Glicose diminuída<br>• Diplococos Gram-negativos</div>Qual receptor inato reconhece o LPS?","opts":["CR1 reconhece LPS sem C3b","TLR4 em macrófagos e neutrófilos reconhece LPS → NF-κB → TNF-α, IL-1, IL-6 → inflamação aguda","TCR do CD4+ reconhece LPS diretamente","BCR do B reconhece LPS e produz IgG imediatamente","MHC-II apresenta LPS intacto ao CD8+"],"cor":1,"let":"B","dif":"Médio","cat":"Imunidade Inata/PRRs","exp":"LPS = PAMP de Gram-negativos. TLR4 = PRR inato. TLR4→MyD88→NF-κB→citocinas. TLR2=Gram+(peptidoglicano), TLR4=Gram-(LPS), TLR5=flagelina, TLR7/8=RNA viral, TLR9=DNA CpG."},
{"n":28,"q":"Qual estrutura NÃO é reconhecida pelo sistema imune inato como PAMP?","opts":["Flagelina bacteriana","Manose de superfície fúngica","Albumina sérica humana","RNA dupla-fita viral","LPS"],"cor":2,"let":"C","dif":"Médio","cat":"Imunidade Inata/PRRs","exp":"PAMPs = moléculas EXCLUSIVAS de patógenos. LPS, RNA dupla-fita, flagelina, manose = PAMPs. Albumina sérica = proteína PRÓPRIA (self), NÃO é PAMP."},
{"n":29,"q":"'Imunidade inata e adaptativa trabalham integradas.' Qual o principal mecanismo de integração?","opts":["Neutrófilos apresentam antígenos a B nos linfonodos","NK produzem anticorpos quando adaptativa falha","Complemento ativa T diretamente sem APCs","CÉLULA DENDRÍTICA captura antígenos nos tecidos (PRRs/PAMPs = inata), migra a linfonodos e apresenta via MHC a T naïve (ativação adaptativa) — é a ponte funcional","Anticorpos adaptativa ativam TLRs da inata"],"cor":3,"let":"D","dif":"Médio","cat":"Imunidade Inata/PRRs","exp":"Dendrítica = PONTE. Inata: PRRs capturam antígeno. Transição: migra via linfáticos → linfonodo. Adaptativa: apresenta peptídeo+MHC a T naïve → ativação."},
{"n":30,"q":"Compare infecção e inflamação. 'Queimadura causa inflamação intensa sem infecção.'","opts":["Infecção é inata e inflamação é adaptativa","Inflamação só ocorre com febre sistêmica","Infecção e inflamação são sinônimos","Inflamação é sempre mais grave que infecção","Infecção = presença de microrganismo patogênico; Inflamação = resposta tecidual COM ou SEM infecção (estéril). Sinais cardinais: calor, rubor, tumor/edema, dor, perda de função. Exemplos estéreis: queimadura, infarto, trauma"],"cor":4,"let":"E","dif":"Médio","cat":"Imunidade Inata/PRRs","exp":"Infecção ≠ Inflamação. Queimadura, infarto, trauma = inflamação SEM infecção (estéril). Sinais: calor (vasodilatação), rubor (hiperemia), tumor (permeabilidade), dor (bradicinina), perda de função."},
{"n":31,"q":"Diabético com candidíase oral recorrente. Deficiência funcional de TH17.<br><br>Por que TH17 é essencial contra Candida?","opts":["TH17 produz IL-10 que suprime inflamação excessiva","TH17 ativa complemento pela via alternativa","TH17 produz IL-17 que recruta NEUTRÓFILOS em massa; sem IL-17, fungos (Candida) e bactérias extracelulares agressivas proliferam","TH17 produz IL-4 que estimula IgE antifúngica","TH17 produz IFN-γ contra fungos intracelulares"],"cor":2,"let":"C","dif":"Médio","cat":"Imunidade Inata/PRRs","exp":"TH1→IFN-γ (intracelulares). TH2→IL-4/IL-5 (helmintos, alergia). TH17→IL-17 (neutrófilos, bactérias agressivas, FUNGOS). Candida = eixo TH17/neutrófilos. Deficiência TH17→candidíase mucocutânea."},
{"n":32,"q":"Lactente em aleitamento com gastroenterite por rotavírus. Qual Ig do leite protege mucosas?","opts":["IgM pentamérica lisa rotavírus por complemento intestinal","IgE sensibiliza mastócitos intestinais","IgD ativa B do MALT do bebê","IgG do leite atravessa mucosa e neutraliza no sangue","IgA secretora (sIgA) reveste mucosa intestinal, impede adesão (exclusão imune), neutraliza toxinas/vírus — SEM ativar complemento, SEM inflamação (proteção silenciosa)"],"cor":4,"let":"E","dif":"Médio","cat":"Imunoglobulinas","exp":"IgA secretora: dimérica + componente secretor, resiste a proteases, NÃO ativa complemento. IgG cruza PLACENTA (FcRn), não mucosa. IgM é grande demais para secreção eficiente."},
{"n":33,"q":"RN de mãe Rh- (2º filho Rh+) nasce com anemia hemolítica. Coombs direto: IgG anti-D.<br><br><div class='lab'>• Hb: 8,2 g/dL<br>• BI: 18 mg/dL<br>• Coombs: positivo (IgG)<br>• Reticulócitos: elevados</div>Por que no 2º filho e não no 1º?","opts":["1ª gestação: sensibilização → IgM (NÃO cruza placenta). 2ª gestação: B de memória → IgG anti-D (cruza placenta via FcRn) → opsoniza hemácias fetais → hemólise","Mãe só produz anticorpos após o segundo parto","Primeiro filho era Rh-negativo","Primeiro feto não expressa Rh por imaturidade","Complemento materno só ativa na segunda gestação"],"cor":0,"let":"A","dif":"Difícil","cat":"Imunoglobulinas","exp":"1ª gestação: IgM (pentamérica, NÃO cruza placenta). 2ª: resposta secundária → IgG (monomérica, cruza via FcRn) → hemólise. RhoGAM previne sensibilização."},
{"n":34,"q":"2ª dose da vacina hepatite B. Anti-HBs IgG elevado, alta avidez.<br><br><div class='lab'>• Após 1ª dose: IgM baixo, IgG mínimo<br>• Após 2ª dose: IgG elevado, IgM mínimo<br>• Avidez: alta</div>Qual o mecanismo da resposta secundária?","opts":["2ª dose ativa exclusivamente complemento via clássica","B e T de memória reativados rapidamente; B de memória já sofreu troca de classe e hipermutação somática → IgG de alta afinidade sem novo processamento completo","NK de memória reconhecem antígeno e ativam B","2ª dose tem mais antígeno, ativa mais B naïve","Adjuvante da 2ª dose é diferente e mais potente"],"cor":1,"let":"B","dif":"Médio","cat":"Imunoglobulinas","exp":"Primária: B naïve → lenta → IgM → centro germinativo: troca de classe + hipermutação → B memória. Secundária: B memória (alta afinidade) + T memória → rápida → IgG alta avidez. Fundamento do booster."},
{"n":35,"q":"Estrutura fundamental de uma IgG:","opts":["Cinco subunidades pentaméricas com cadeia J","Estrutura linear sem dobramento","Uma pesada sem leve e sem pontes","Duas cadeias pesadas + duas leves ligadas por pontes dissulfeto; Fab (variável) = ligação ao antígeno; Fc (constante) = função efetora (receptores Fc, complemento, transferência placentária)","Uma cadeia pesada simples ligada a antígeno"],"cor":3,"let":"D","dif":"Médio","cat":"Imunoglobulinas","exp":"IgG = monomérica. 2H + 2L = Y. Fab = especificidade. Fc = efetora: (1) receptores Fc → opsonização, (2) C1q → via clássica, (3) FcRn → placenta. IgM = pentamérica. IgA secretora = dimérica."},
{"n":36,"q":"'IgM aparece primeiro. Qual significado clínico e por que é substituída por IgG?'","opts":["IgM = pentamérica, PRIMEIRA na primária, FASE AGUDA, baixa afinidade/alta avidez (10 sítios); IgG = monomérica, secundária após troca de classe, MEMÓRIA/IMUNIDADE, alta afinidade por hipermutação somática","IgM e IgG aparecem simultaneamente","IgM monomérica e IgG pentamérica","IgM indica imunidade duradoura, IgG indica aguda","IgM cruza placenta e IgG não"],"cor":0,"let":"A","dif":"Médio","cat":"Imunoglobulinas","exp":"IgM: pentamérica, 10 sítios, NÃO cruza placenta, aguda. IgG: monomérica, alta afinidade, cruza placenta (FcRn), mais abundante. Troca IgM→IgG requer TFH (T-independentes ficam em IgM)."},
{"n":37,"q":"TB pulmonar. Controle depende de citocina que ativa macrófagos.<br><br>Qual subtipo TH e citocina são essenciais?","opts":["TH2 / IL-4 → ativa B para IgE anti-TB","TH17 / IL-17 → recruta neutrófilos contra TB","Treg / IL-10 → suprime inflamação controlando TB","TH1 / IFN-γ → ativa macrófagos para killing de intracelulares via burst oxidativo; sem IFN-γ (AIDS), não há granuloma e TB dissemina","TFH / IL-21 → anticorpos neutralizantes anti-TB"],"cor":3,"let":"D","dif":"Médio","cat":"Citocinas/TH","exp":"Intracelulares (vírus, micobactérias) → TH1 → IFN-γ → macrófago ativado → burst oxidativo + NO. HIV sem CD4 → sem TH1 → sem IFN-γ → sem granuloma → TB miliar."},
{"n":38,"q":"Gestante com pré-eclâmpsia. Qual perfil imunológico na gestação normal?","opts":["IgE materna forma barreira placentária","Feto não expressa HLA, invisível ao sistema materno","Imunossupressão total — sistema completamente inativo","TH1 com IFN-γ protege feto contra infecções","Predominância TH2 (IL-4, IL-10) e Treg mediada pela progesterona, suprimindo TH1 citotóxico; desequilíbrio para TH1 → pré-eclâmpsia e aborto"],"cor":4,"let":"E","dif":"Difícil","cat":"Citocinas/TH","exp":"Gestação = TH2/Treg na interface placentária. Progesterona→TH2 (anti-inflamatório) + Treg (tolerância). Trofoblasto expressa HLA-G (inibe NK). TH1 dominante → dano endotelial → pré-eclâmpsia. NÃO é imunossupressão total."},
{"n":39,"q":"Asmático com eosinofilia no escarro. Qual a rede TH2?","opts":["IFN-γ ativa eosinófilos e IL-17 recruta mastócitos","IL-4 induz troca para IgE; IL-5 estimula eosinófilos; IL-13 causa hipersecreção mucosa e remodelamento brônquico — resposta TH2 alérgica","TNF-α ativa eosinófilos e IL-10 estimula IgE","IL-2 estimula mastócitos e IL-6 produz IgE","IL-17 é central na alergia e recruta basófilos"],"cor":1,"let":"B","dif":"Médio","cat":"Citocinas/TH","exp":"TH2: IL-4 = IgE. IL-5 = eosinófilos. IL-13 = muco/fibrose. IgE→mastócitos (FcεRI). TH1=IFN-γ. TH17=IL-17. Treg=IL-10/TGF-β. Tabela obrigatória para prova."},
{"n":40,"q":"Complete a tabela de subtipos TH:<br><br><div class='lab'>TH1 → citocina: ? → alvo: ?<br>TH2 → citocina: ? → alvo: ?<br>TH17 → citocina: ? → recruta: ?<br>Treg → citocinas: ? → função: ?</div>","opts":["Todos os subtipos produzem as mesmas citocinas","TH1→IL-4→extracelulares; TH2→IFN-γ→intracelulares; TH17→IL-10→macrófagos; Treg→IL-17→inflamação","TH1→IFN-γ→intracelulares; TH2→IL-4/IL-5→helmintos e alergia; TH17→IL-17→neutrófilos (bactérias agressivas, fungos); Treg→IL-10/TGF-β→supressão/regulação","TH1→IL-17→fungos; TH2→TNF-α→bactérias; TH17→IFN-γ→vírus; Treg→IL-4→ativação","TH1→IL-5→eosinófilos; TH2→IL-17→neutrófilos; TH17→IL-10→supressão; Treg→IFN-γ→ativação"],"cor":2,"let":"C","dif":"Médio","cat":"Citocinas/TH","exp":"TH1→IFN-γ→macrófagos→INTRACELULARES. TH2→IL-4(IgE)/IL-5(eos)→HELMINTOS/ALERGIA. TH17→IL-17→NEUTRÓFILOS→bactérias agressivas/FUNGOS. Treg→IL-10/TGF-β→SUPRESSÃO. TFH→IL-21→help B."},

{"n":58,"q":"Tumor superexpressa Bcl-2 (anti-apoptótica). Por que escapa da vigilância?","opts":["Bcl-2 produz IgG protetora","Bcl-2 impede entrada de anticorpos","Bcl-2 transforma tumor em APC que desativa CD8+","Bcl-2 ativa complemento a favor do tumor","Bcl-2 bloqueia via mitocondrial: impede Bax/Bak → sem citocromo c → sem apoptossomo → caspase 9 não ativa → caspase 3 não ativa → tumor resiste à apoptose por CD8+/NK"],"cor":4,"let":"E","dif":"Difícil","cat":"Apoptose/Citotox","exp":"Bcl-2 = anti-apoptótica (inibe Bax/Bak). Bloqueia ANTES do citocromo c. Tumores com Bcl-2: resistem a CD8+, NK e quimioterapia. Venetoclax = inibidor de Bcl-2."},

];

// ===== ENGINE =====
let Q=[...ALL],cur=0,ans={},rev={};
const $=s=>document.getElementById(s);

// Dark mode persistence (default: dark)
if(localStorage.getItem('dk')==='false') document.body.classList.remove('dark');

// Populate category filter
const cats=[...new Set(ALL.map(q=>q.cat))].sort();
cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;$('catFilter').appendChild(o)});

function applyFilter(){
  const c=$('catFilter').value,d=$('diffFilter').value;
  Q=ALL.filter(q=>(c==='all'||q.cat===c)&&(d==='all'||q.dif===d));
  if(!Q.length){Q=[...ALL];$('catFilter').value='all';$('diffFilter').value='all'}
  cur=0;ans={};rev={};render();
}
function shuffle(){Q.sort(()=>Math.random()-.5);cur=0;ans={};rev={};render()}
function resetAll(){ans={};rev={};cur=0;render()}
function toggleHeader(){const h=$('hdr');h.classList.toggle('collapsed');$('menuBtn').textContent=h.classList.contains('collapsed')?'☰ Menu':'✕ Fechar'}

function render(){
  const q=Q[cur];
  if(!q)return;
  // Stats
  const done=Object.keys(rev).length,right=Object.keys(rev).filter(k=>ans[k]===Q[k].cor).length,wrong=done-right;
  $('stats').innerHTML=`<span>${done}/${Q.length} respondidas</span><span>${right} certas</span><span>${done?Math.round(right/done*100):0}%</span>`;
  $('st-done').textContent=done+'/'+Q.length;
  $('st-right').textContent=right;
  $('st-wrong').textContent=wrong;
  $('st-pct').textContent=(done?Math.round(right/done*100):0)+'%';
  // Card
  let h=`<div class="qinfo"><span class="qnum">Questão ${cur+1} de ${Q.length}</span><div class="tags"><span class="diff">${q.dif}</span><span class="cat">${q.cat}</span></div></div>`;
  h+=`<div class="qtxt">${q.q}</div>`;
  q.opts.forEach((o,i)=>{
    let cls='opt';
    if(rev[cur]){if(i===q.cor)cls+=' correct';else if(ans[cur]===i)cls+=' wrong'}
    else if(ans[cur]===i)cls+=' sel';
    h+=`<button class="${cls}" onclick="pick(${i})">${String.fromCharCode(65+i)}) ${o}</button>`;
  });
  h+=`<div class="btns"><button onclick="reveal()">Revelar</button></div>`;
  h+=`<div class="expl ${rev[cur]?'show':''}" id="expl"><strong>Gabarito: ${q.let}</strong>${q.exp}</div>`;
  $('qcard').innerHTML=h;
  // Grid
  let g='';
  Q.forEach((_,i)=>{
    let c='';if(i===cur)c+=' cur';if(ans[i]!==undefined)c+=' done';
    if(rev[i]&&ans[i]===Q[i].cor)c+=' right';else if(rev[i]&&ans[i]!==undefined)c+=' wrong';
    g+=`<button class="${c}" onclick="cur=${i};render()">${i+1}</button>`;
  });
  $('grid').innerHTML=g;
  $('pf').style.width=(done/Q.length*100)+'%';
  // Show score if all done
  if(done===Q.length){
    $('score').style.display='block';
    $('score').innerHTML=`<h2>Simulado Finalizado</h2><div class="perc">${Math.round(right/done*100)}%</div><div class="detail">${right}/${done} questões corretas<br>Revise as questões marcadas em vermelho</div>`;
  } else $('score').style.display='none';
}
function pick(i){if(!rev[cur]){ans[cur]=i;render()}}
function reveal(){if(ans[cur]!==undefined){rev[cur]=true;render()}}
function go(d){cur=Math.max(0,Math.min(Q.length-1,cur+d));render()}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')go(1);if(e.key==='ArrowLeft')go(-1);if(e.key===' '){e.preventDefault();reveal()}
});
render();
</script>
